<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <!-- iOS: полноэкранный режим при «На экран Домой» -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Тренер">
  <title>Тренер · силовые</title>
  <style>
/* ============================================================
 * app.css — единая тёмная тема, mobile-first, крупные тач-элементы
 * ============================================================ */

:root {
  --bg:        #0e1116;
  --surface:   #171b22;
  --surface-2: #1f242d;
  --line:      #2b313b;
  --text:      #e8ecf1;
  --muted:     #94a0b0;
  --accent:    #4c8dff;
  --accent-2:  #2b6be0;
  --ok:        #37c46a;
  --warn:      #f0a336;
  --cal:       #b07cff;
  --danger:    #ff5d5d;
  --tap:       56px;         /* минимальный размер тач-цели */
  --radius:    14px;
  --nav-h:     66px;         /* высота нижней навигации */
  --safe-t:    env(safe-area-inset-top, 0px);
  --safe-b:    env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* тап по кнопкам/бейджам не выделяет текст и не зовёт контекстное меню iOS */
button, .badge, .chip, .nav, .wk-prog, .meso-badge, .set-row.done {
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
}

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font: 16px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overscroll-behavior: none;
  overflow-x: hidden;
}

/* --- каркас экранов --- */
.app {
  max-width: 560px; margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;          /* dvh — без скачков в мобильном Safari */
  padding-top: var(--safe-t);                      /* контент ниже чёлки/статус-бара */
  padding-bottom: calc(var(--nav-h) + var(--safe-b));
}
.screen { display: none; padding: 12px 12px 0; }
.screen.active { display: block; }

.placeholder {
  margin-top: 40px; text-align: center; color: var(--muted);
  padding: 24px; border: 1px dashed var(--line); border-radius: var(--radius);
}

/* --- нижняя навигация --- */
.nav {
  position: fixed; left: 0; right: 0; bottom: 0;
  display: flex; max-width: 560px; margin: 0 auto;
  background: var(--surface); border-top: 1px solid var(--line);
  padding-bottom: var(--safe-b);                   /* кнопки над home-индикатором */
}
.nav button {
  flex: 1; min-height: 64px; background: none; border: 0; color: var(--muted);
  font-size: 12px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; cursor: pointer;
}
.nav button .ico { font-size: 20px; line-height: 1; }
.nav button.active { color: var(--accent); }

/* --- вкладки дней недели на экране тренировки --- */
.day-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding: 4px 2px 10px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex: 0 0 auto; border: 1px solid var(--line); background: var(--surface);
  color: var(--muted); border-radius: 999px; padding: 10px 16px;
  font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.day-tab.on { background: var(--accent); border-color: var(--accent); color: #fff; }

/* --- ссылка на видео техники --- */
.vid-link { color: var(--accent); text-decoration: none; font-size: 12.5px; white-space: nowrap; }
.vid-link:active { opacity: .7; }

/* --- «прошлый раз» на карточке упражнения --- */
.prev-line {
  color: var(--muted); font-size: 13px; margin: 8px 0 0;
  padding: 8px 10px; background: var(--surface-2); border-radius: 10px;
}

/* --- мастер создания программы --- */
.wiz-step { font-size: 15px; margin: 6px 2px 10px; }
.wiz-step small { color: var(--muted); }
.chip.wd { padding: 8px 10px; min-width: 44px; text-align: center; }
.wd-row { margin: 2px 0 10px; }
.btn[disabled] { opacity: .45; cursor: default; }

/* --- шапка тренировки --- */
.wk-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 4px 14px;
}
.wk-title { font-weight: 700; font-size: 17px; }
.wk-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
.wk-prog {
  font-weight: 700; font-size: 18px; color: var(--accent);
  background: var(--surface-2); padding: 8px 14px; border-radius: 999px;
}

/* --- карточка упражнения --- */
.ex-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 12px; margin-bottom: 12px;
}
.ex-card.complete { opacity: .7; }
.ex-head { margin-bottom: 8px; }
.ex-name { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
.ex-meta { color: var(--muted); font-size: 12.5px; margin-top: 3px; }

.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 700; }
.badge.cal { background: rgba(176,124,255,.18); color: var(--cal); }
.badge.ok  { background: rgba(55,196,106,.18); color: var(--ok); }

.rec-line {
  background: var(--surface-2); color: var(--muted);
  font-size: 13px; padding: 8px 10px; border-radius: 10px; margin: 8px 0;
  border-left: 3px solid var(--accent);
}

/* --- строка сета --- */
.set-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.set-row.done {
  background: var(--surface-2); border-radius: 10px; padding: 10px 12px;
  font-size: 15px;
}
.set-row.done .set-no { color: var(--muted); width: 42px; font-size: 12px; }
.set-row.done .set-res { flex: 1; font-weight: 600; }

.set-row.active { justify-content: space-between; gap: 6px; }

/* --- степпер --- */
.stepper {
  display: flex; align-items: center; background: var(--surface-2);
  border-radius: 12px; overflow: hidden; flex: 1;
}
.stepper .step {
  min-width: var(--tap); height: var(--tap); border: 0; cursor: pointer;
  background: transparent; color: var(--text); font-size: 26px; font-weight: 600;
}
.stepper .step:active { background: var(--line); }
.stepper .val { flex: 1; text-align: center; padding: 4px 2px; display: block; }
.stepper .val b { display: block; font-size: 19px; }
.stepper .val small { color: var(--muted); font-size: 10.5px; }

/* редактируемые поля ввода вместо статичных чисел */
.val-in, .ms-in {
  display: block; width: 100%; box-sizing: border-box; padding: 0;
  background: transparent; border: 0; color: var(--text);
  text-align: center; font-family: inherit; font-weight: 600;
  -moz-appearance: textfield; appearance: textfield;
}
.val-in { font-size: 19px; }         /* ≥16px — iOS не зумит при фокусе */
.ms-in { font-size: 16px; }
.val-in:focus, .ms-in:focus { outline: none; color: var(--accent); }
.val-in::-webkit-outer-spin-button, .val-in::-webkit-inner-spin-button,
.ms-in::-webkit-outer-spin-button, .ms-in::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.log {
  min-width: var(--tap); height: var(--tap); border: 0; border-radius: 12px;
  background: var(--accent); color: #fff; font-size: 24px; font-weight: 700; cursor: pointer;
}
.log:active { background: var(--accent-2); }

/* --- ввод подхода: подпись + [−][поле][+] на всю ширину (простор для ручного ввода) --- */
.entry { margin-top: 8px; }
.ef { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.ef-lbl { flex: 0 0 92px; color: var(--muted); font-size: 13px; }
.ef-ctrl {
  display: flex; align-items: center; flex: 1; min-width: 0;
  background: var(--surface-2); border-radius: 12px; overflow: hidden;
}
.ef-ctrl .step {
  flex: 0 0 auto; min-width: 52px; height: 52px; border: 0; cursor: pointer;
  background: transparent; color: var(--text); font-size: 26px; font-weight: 600;
}
.ef-ctrl .step:active { background: var(--line); }
.ef-ctrl .val-in { flex: 1; min-width: 0; font-size: 20px; }
.log-wide {
  width: 100%; height: 54px; margin-top: 12px; border: 0; border-radius: 12px;
  background: var(--accent); color: #fff; font-size: 17px; font-weight: 700; cursor: pointer;
}
.log-wide:active { background: var(--accent-2); }

.mini {
  border: 0; background: transparent; color: var(--muted); font-size: 16px;
  width: 32px; height: 32px; cursor: pointer; border-radius: 8px;
}
.mini:active { background: var(--line); color: var(--danger); }

/* --- таймер отдыха --- */
.rest-bar {
  position: fixed; left: 0; right: 0; bottom: calc(var(--nav-h) + var(--safe-b));
  max-width: 560px; margin: 0 auto;
  background: var(--surface-2); border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  overflow: hidden;
}
.rest-fill {
  position: absolute; left: 0; top: 0; bottom: 0; background: rgba(76,141,255,.18);
  transition: width .25s linear; z-index: 0;
}
.rest-bar.over { background: rgba(55,196,106,.18); }
.rest-bar.over .rest-fill { background: rgba(55,196,106,.28); }
.rest-txt { flex: 1; font-weight: 700; z-index: 1; }
.rest-add, .rest-skip {
  z-index: 1; min-height: 44px; padding: 0 14px; border-radius: 10px; border: 0;
  background: var(--surface); color: var(--text); font-weight: 600; cursor: pointer;
}
.rest-skip { background: var(--accent); color: #fff; }

/* ============================================================
 * Экран программы (конструктор)
 * ============================================================ */

.prog-top { display: flex; align-items: center; justify-content: space-between; padding: 6px 4px 12px; }

.btn {
  border: 0; border-radius: 10px; background: var(--accent); color: #fff;
  font-weight: 600; padding: 10px 16px; min-height: 44px; cursor: pointer;
}
.btn.sm { padding: 8px 12px; min-height: 40px; font-size: 13px; }
.btn.ghost { background: var(--surface-2); color: var(--text); }

.day-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 12px; margin-bottom: 12px;
}
.day-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.day-label { font-weight: 700; font-size: 16px; }

.pi-empty { color: var(--muted); font-size: 13px; padding: 8px 2px; }
.prog-item {
  background: var(--surface-2); border-radius: 10px; padding: 10px; margin-top: 8px;
}
.pi-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.pi-name { font-weight: 600; }
.pi-ord { display: flex; gap: 2px; }

.pi-params { display: flex; gap: 6px; flex-wrap: wrap; }
.mstep {
  display: flex; align-items: center; background: var(--surface);
  border-radius: 10px; overflow: hidden; flex: 1 1 108px; min-width: 108px;
}
.ms-btn {
  flex: 0 0 auto; min-width: 34px; height: 48px; border: 0; background: transparent;
  color: var(--text); font-size: 22px; cursor: pointer;
}
.ms-btn:active { background: var(--line); }
.ms-val { flex: 1; min-width: 0; text-align: center; }
.ms-val b { display: block; font-size: 16px; }
.ms-val small { color: var(--muted); font-size: 9.5px; }

/* --- оверлей выбора упражнения --- */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: flex; align-items: flex-end; justify-content: center; z-index: 20;
}
.sheet {
  width: 100%; max-width: 560px; max-height: 82vh; overflow-y: auto;
  background: var(--surface); border-radius: 18px 18px 0 0;
  border: 1px solid var(--line); padding: 14px;
}
.sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

.in {
  width: 100%; box-sizing: border-box; margin-bottom: 10px;
  background: var(--surface-2); border: 1px solid var(--line); color: var(--text);
  border-radius: 10px; padding: 12px; font-size: 15px;
}
.in.short { width: 100px; margin-bottom: 0; }

.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.chip {
  border: 1px solid var(--line); background: var(--surface-2); color: var(--muted);
  border-radius: 999px; padding: 8px 12px; font-size: 13px; cursor: pointer; min-height: 40px;
}
.chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }

.lib-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.lib-row {
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
  text-align: left; border: 0; background: var(--surface-2); color: var(--text);
  border-radius: 10px; padding: 12px; cursor: pointer; min-height: 52px;
}
.lib-row small { color: var(--muted); }
.lib-row:active { background: var(--line); }

.custom-form { border-top: 1px solid var(--line); padding-top: 12px; }
.custom-form .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.cx-err { color: var(--danger); font-size: 13px; min-height: 16px; margin-bottom: 6px; }

/* ============================================================
 * Экран аналитики
 * ============================================================ */

.an-screen .wk-title { padding: 6px 4px 12px; }
.an-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 12px; margin-bottom: 12px;
}
.an-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
.an-head small { color: var(--muted); font-size: 12px; }
.chart { width: 100%; height: 160px; display: block; }

.sel {
  background: var(--surface-2); color: var(--text); border: 1px solid var(--line);
  border-radius: 10px; padding: 8px 10px; font-size: 14px; max-width: 60%;
}

.stag { background: var(--surface-2); border-left: 3px solid var(--warn); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
.stag-name { font-weight: 700; }
.stag-hint { color: var(--muted); font-size: 13px; margin-top: 3px; }

.hist-ses { margin-bottom: 12px; }
.hist-date { color: var(--muted); font-size: 12px; margin: 4px 2px 6px; }
.hist-row { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.hist-ex { flex: 1; font-weight: 600; }
.hist-val { color: var(--muted); }

.hist-edit { background: var(--surface-2); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; }
.hist-edit .pi-params { margin-top: 8px; }
.hist-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; }

/* ============================================================
 * Экран настроек (мезоцикл + бэкап)
 * ============================================================ */

.meso-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.meso-badge { background: var(--surface-2); border-radius: 999px; padding: 8px 14px; font-weight: 600; font-size: 13px; }
.meso-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.meso-hint { color: var(--muted); font-size: 12.5px; margin-top: 10px; }

/* «нудж» на вкладке настроек, если бэкап просрочен */
.nav button.nudge { position: relative; }
.nav button.nudge::after {
  content: ''; position: absolute; top: 10px; right: calc(50% - 16px);
  width: 8px; height: 8px; border-radius: 50%; background: var(--warn);
}

</style>
</head>
<body>
  <div class="app">
    <!-- Экран: Тренировка (чанк 3) -->
    <section class="screen active" id="screen-workout">
      <div id="workout-root"></div>
    </section>

    <!-- Экран: Программа (чанк 4) -->
    <section class="screen" id="screen-program">
      <div id="program-root"></div>
    </section>

    <!-- Экран: Аналитика (чанк 5) -->
    <section class="screen" id="screen-analytics">
      <div id="analytics-root"></div>
    </section>

    <!-- Экран: Настройки / бэкап (чанк 6) -->
    <section class="screen" id="screen-settings">
      <div id="settings-root"></div>
    </section>
  </div>

  <!-- Нижняя навигация (полноценный роутер — app.js, чанк 6) -->
  <nav class="nav" id="nav">
    <button class="active" data-screen="workout"><span class="ico">🏋️</span>Трен.</button>
    <button data-screen="program"><span class="ico">🗂️</span>Программа</button>
    <button data-screen="analytics"><span class="ico">📈</span>Аналитика</button>
    <button data-screen="settings"><span class="ico">⚙️</span>Настройки</button>
  </nav>

  <!-- Порядок важен: библиотека → store → движок/аналитика → экраны → контроллер -->
  <script>
/* ============================================================
 * exercises.js — встроенная библиотека упражнений
 * Контракт: EXERCISE_LIBRARY: Exercise[]
 * Exercise: { id, name, primaryMuscle, secondaryMuscles, kind, weightStep }
 * primaryMuscle: chest|back|legs|shoulders|arms|core
 * kind: compound|isolation
 * weightStep: минимальный шаг изменения веса, кг
 * ============================================================ */

const MUSCLE_LABELS = {
  chest: 'Грудь', back: 'Спина', legs: 'Ноги',
  shoulders: 'Плечи', arms: 'Руки', core: 'Кор',
};

const EXERCISE_LIBRARY = [
  // ---- Грудь ----
  { id: 'bb-bench-press',      name: 'Жим штанги лёжа',                primaryMuscle: 'chest', secondaryMuscles: ['shoulders', 'arms'], kind: 'compound',  weightStep: 2.5 },
  { id: 'db-bench-press',      name: 'Жим гантелей лёжа',              primaryMuscle: 'chest', secondaryMuscles: ['shoulders', 'arms'], kind: 'compound',  weightStep: 2 },
  { id: 'incline-bb-press',    name: 'Жим штанги на наклонной',        primaryMuscle: 'chest', secondaryMuscles: ['shoulders', 'arms'], kind: 'compound',  weightStep: 2.5 },
  { id: 'incline-db-press',    name: 'Жим гантелей на наклонной',      primaryMuscle: 'chest', secondaryMuscles: ['shoulders', 'arms'], kind: 'compound',  weightStep: 2 },
  { id: 'machine-chest-press', name: 'Жим в тренажёре на грудь',       primaryMuscle: 'chest', secondaryMuscles: ['shoulders', 'arms'], kind: 'compound',  weightStep: 5 },
  { id: 'dips',                name: 'Отжимания на брусьях',           primaryMuscle: 'chest', secondaryMuscles: ['arms', 'shoulders'], kind: 'compound',  weightStep: 2.5 },
  { id: 'cable-fly',           name: 'Сведение в кроссовере',          primaryMuscle: 'chest', secondaryMuscles: [],                     kind: 'isolation', weightStep: 2.5 },
  { id: 'db-fly',              name: 'Разводка гантелей лёжа',         primaryMuscle: 'chest', secondaryMuscles: [],                     kind: 'isolation', weightStep: 2 },
  { id: 'pec-deck',            name: 'Бабочка (пек-дек)',              primaryMuscle: 'chest', secondaryMuscles: [],                     kind: 'isolation', weightStep: 5 },

  // ---- Спина ----
  { id: 'db-shrug',            name: 'Шраги с гантелями',              primaryMuscle: 'back',  secondaryMuscles: ['shoulders'],         kind: 'isolation', weightStep: 2 },
  { id: 'deadlift',            name: 'Становая тяга',                  primaryMuscle: 'back',  secondaryMuscles: ['legs', 'core'],      kind: 'compound',  weightStep: 2.5 },
  { id: 'pull-up',             name: 'Подтягивания',                   primaryMuscle: 'back',  secondaryMuscles: ['arms'],              kind: 'compound',  weightStep: 2.5 },
  { id: 'lat-pulldown',        name: 'Тяга верхнего блока',            primaryMuscle: 'back',  secondaryMuscles: ['arms'],              kind: 'compound',  weightStep: 5 },
  { id: 'bb-row',              name: 'Тяга штанги в наклоне',          primaryMuscle: 'back',  secondaryMuscles: ['arms', 'core'],      kind: 'compound',  weightStep: 2.5 },
  { id: 'db-row',              name: 'Тяга гантели в наклоне',         primaryMuscle: 'back',  secondaryMuscles: ['arms'],              kind: 'compound',  weightStep: 2 },
  { id: 'seated-cable-row',    name: 'Тяга горизонтального блока',     primaryMuscle: 'back',  secondaryMuscles: ['arms'],              kind: 'compound',  weightStep: 5 },
  { id: 't-bar-row',           name: 'Тяга Т-грифа',                   primaryMuscle: 'back',  secondaryMuscles: ['arms', 'core'],      kind: 'compound',  weightStep: 2.5 },
  { id: 'straight-arm-pd',     name: 'Пуловер на блоке',               primaryMuscle: 'back',  secondaryMuscles: [],                     kind: 'isolation', weightStep: 2.5 },
  { id: 'hyperextension',      name: 'Гиперэкстензия',                 primaryMuscle: 'back',  secondaryMuscles: ['legs', 'core'],      kind: 'isolation', weightStep: 2.5 },

  // ---- Ноги ----
  { id: 'bb-squat',            name: 'Приседания со штангой',          primaryMuscle: 'legs',  secondaryMuscles: ['core'],              kind: 'compound',  weightStep: 2.5 },
  { id: 'front-squat',         name: 'Фронтальные приседания',         primaryMuscle: 'legs',  secondaryMuscles: ['core'],              kind: 'compound',  weightStep: 2.5 },

 *  для пользовательских упражнений. */
function videoUrl(exercise) {
  if (!exercise) return null;
  if (exercise.video) return exercise.video;
  return 'https://www.youtube.com/results?search_query=' +
    encodeURIComponent(exercise.name + ' техника выполнения');
}

  return state.exercises.filter((e) => {

    if (q && !e.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

  <script>
/* ============================================================
 * store.js — слой хранения (единственная точка чтения/записи)
 * Контракт (аналоги endpoints):
 *   load()                        GET  /state
 *   save(state)                   PUT  /state
 *   exportBackup(state)           GET  /backup   -> {filename, json}
 *   importBackup(json)            POST /backup   -> state | throws
 *   startSession(state, dayId)    POST /sessions
 *   logSet(state, sessionId, s)   POST /sessions/:id/sets
 *   updateSet(state, setId, p)    PATCH /sets/:id
 *   deleteSet(state, setId)       DELETE /sets/:id
 * Все мутирующие функции: принимают state, возвращают новый state,
 * вызывающий обязан затем сделать save(). UI в state напрямую не пишет.
 * ============================================================ */

const STORAGE_KEY = 'workoutCoach.v1';
const SCHEMA_VERSION = 1;

/* ---------- дефолтное состояние ---------- */

function defaultState(exerciseLibrary) {
  return {
    schemaVersion: SCHEMA_VERSION,
    settings: {
      weightStepDefault: 2.5,
      backupReminderDays: 14,
      lastBackupAt: null,
    },
    exercises: exerciseLibrary.map((e) => ({ ...e, isCustom: false })),
    program: { days: [] },          // конструктор заполнит A/B/C
    sessions: [],
    mesocycle: {
      cycleNo: 1,
      weekNo: 1,                    // 1..6 (6 = делоуд при growWeeks=5)
      growWeeks: 5,
      startedAt: new Date().toISOString(),
      deloadShift: 0,               // ручной сдвиг делоуда ±1 (риск из PRD)
    },
  };
}

/* ---------- миграции ---------- */

const MIGRATIONS = {
  // 1 -> 2: (пример на будущее) (s) => { ...s, schemaVersion: 2 }
};

function migrate(state) {
  let s = state;
  while (s.schemaVersion < SCHEMA_VERSION) {
    const fn = MIGRATIONS[s.schemaVersion];
    if (!fn) throw new Error(`Нет миграции со схемы v${s.schemaVersion}`);
    s = fn(s);
  }
  return s;
}

/* ---------- load / save ---------- */

/** Домердж встроенной библиотеки: новые упражнения из кода появляются
 *  и в старых сохранённых состояниях (пользовательские не трогаем). */
function mergeLibrary(state, exerciseLibrary) {
  const have = new Set(state.exercises.map((e) => e.id));
  const missing = (exerciseLibrary || []).filter((e) => !have.has(e.id));
  if (!missing.length) return state;
  return { ...state, exercises: [...state.exercises, ...missing.map((e) => ({ ...e, isCustom: false }))] };
}

function load(exerciseLibrary) {
  let raw = null;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (_) { /* private mode */ }
  if (!raw) return defaultState(exerciseLibrary);
  try {
    const parsed = JSON.parse(raw);
    validateState(parsed);
    return mergeLibrary(migrate(parsed), exerciseLibrary);
  } catch (err) {
    // повреждённое состояние не затираем молча: сохраняем аварийную копию
    try { localStorage.setItem(STORAGE_KEY + '.corrupt', raw); } catch (_) {}
    console.error('Состояние повреждено, старт с чистого. Копия: .corrupt', err);
    return defaultState(exerciseLibrary);
  }
}

function save(state) {
  validateState(state);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  return state;
}

/* ---------- валидация (минимальная, структурная) ---------- */

function validateState(s) {
  const fail = (m) => { throw new Error('Invalid state: ' + m); };
  if (!s || typeof s !== 'object') fail('not an object');
  if (typeof s.schemaVersion !== 'number') fail('schemaVersion');
  if (!Array.isArray(s.exercises)) fail('exercises');
  if (!s.program || !Array.isArray(s.program.days)) fail('program.days');
  if (!Array.isArray(s.sessions)) fail('sessions');
  if (!s.mesocycle || typeof s.mesocycle.weekNo !== 'number') fail('mesocycle');
  return true;
}

/* ---------- бэкап ---------- */

function exportBackup(state) {
  const stamped = {
    ...state,
    settings: { ...state.settings, lastBackupAt: new Date().toISOString() },
  };
  const date = new Date().toISOString().slice(0, 10);
  return {
    state: stamped,                                   // сохранить после скачивания
    filename: `workout-backup-${date}.json`,
    json: JSON.stringify(stamped, null, 2),
  };
}

function importBackup(jsonString) {
  const parsed = JSON.parse(jsonString);              // throws при мусоре
  validateState(parsed);
  return migrate(parsed);
}

function backupOverdue(state, now = new Date()) {
  const { lastBackupAt, backupReminderDays } = state.settings;
  if (!lastBackupAt) return state.sessions.length >= 3;   // напоминаем после 3 тренировок
  const ageDays = (now - new Date(lastBackupAt)) / 86400000;
  return ageDays >= backupReminderDays;
}

/* ---------- id ---------- */

function genId(prefix) {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
}

/* ---------- сессии и подходы ---------- */

function startSession(state, dayId, { date = new Date().toISOString(), isDeload = false } = {}) {
  const session = {
    id: genId('ses'),
    date,
    dayId,
    weekNo: state.mesocycle.weekNo,
    isDeload,
    sets: [],
    note: null,
  };
  return { state: { ...state, sessions: [...state.sessions, session] }, session };
}

function logSet(state, sessionId, setInput) {
  const set = {
    id: genId('set'),
    exerciseId: setInput.exerciseId,
    setNo: setInput.setNo,
    weight: Number(setInput.weight),
    reps: Number(setInput.reps),
    rir: setInput.rir == null ? null : Number(setInput.rir),
    isCalibration: !!setInput.isCalibration,
    analysis: null,                 // задел v2: видеоанализ
    mediaRef: null,                 // задел v2
  };
  if (!(set.weight >= 0) || !(set.reps > 0)) throw new Error('Некорректные вес/повторы');
  const sessions = state.sessions.map((s) =>
    s.id === sessionId ? { ...s, sets: [...s.sets, set] } : s
  );
  if (!sessions.some((s) => s.id === sessionId)) throw new Error('Сессия не найдена: ' + sessionId);
  return { state: { ...state, sessions }, set };
}

function updateSet(state, setId, patch) {
  let found = false;
  const allowed = ['weight', 'reps', 'rir', 'isCalibration'];
  const sessions = state.sessions.map((s) => ({
    ...s,
    sets: s.sets.map((st) => {
      if (st.id !== setId) return st;
      found = true;
      const clean = Object.fromEntries(
        Object.entries(patch).filter(([k]) => allowed.includes(k))
      );
      return { ...st, ...clean };
    }),
  }));
  if (!found) throw new Error('Подход не найден: ' + setId);
  return { ...state, sessions };
}

function deleteSet(state, setId) {
  const sessions = state.sessions.map((s) => ({
    ...s,
    sets: s.sets.filter((st) => st.id !== setId),
  }));
  return { ...state, sessions };
}

/* ---------- выборки истории (для engine и UI) ---------- */

/** Все подходы упражнения, сгруппированные по сессиям, новые первыми */
function exerciseHistory(state, exerciseId, { includeCalibration = false, limit = 10 } = {}) {
  const out = [];
  const sessions = [...state.sessions].sort((a, b) => new Date(b.date) - new Date(a.date));
  for (const ses of sessions) {
    const sets = ses.sets.filter(
      (st) => st.exerciseId === exerciseId && (includeCalibration || !st.isCalibration)
    );
    if (sets.length) out.push({ sessionId: ses.id, date: ses.date, isDeload: ses.isDeload, weekNo: ses.weekNo, sets });
    if (out.length >= limit) break;
  }
  return out;
}

/* ---------- программа: дни A/B/C и их упражнения ----------
 * Тот же контракт, что у сессий: принимают state, возвращают новый
 * (addDay/addCustomExercise возвращают { state, day|exercise }).
 * DayTemplate = { id, label, items: [DayItem] }
 * DayItem = { exerciseId, repRangeMin, repRangeMax, workSets, targetRIR, restSec }
 */

function nextDayLabel(days) {
  const used = new Set(days.map((d) => d.label));
  for (const c of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ') if (!used.has(c)) return c;
  return 'День ' + (days.length + 1);
}

function normalizeItem(item) {
  const it = {
    exerciseId: item.exerciseId,
    repRangeMin: Number(item.repRangeMin),
    repRangeMax: Number(item.repRangeMax),
    workSets: Number(item.workSets),
    targetRIR: item.targetRIR == null ? 2 : Number(item.targetRIR),
    restSec: Number(item.restSec),
  };
  if (!it.exerciseId) throw new Error('Нужен exerciseId');
  if (!(it.workSets > 0)) throw new Error('workSets должно быть > 0');
  if (!(it.repRangeMin > 0) || !(it.repRangeMax >= it.repRangeMin)) throw new Error('Некорректный диапазон повторов');
  return it;
}

function mapDay(state, dayId, fn) {
  let found = false;
  const days = state.program.days.map((d) => {
    if (d.id !== dayId) return d;
    found = true;
    return fn(d);
  });
  if (!found) throw new Error('День не найден: ' + dayId);
  return { ...state, program: { ...state.program, days } };
}

function addDay(state, { label, weekday = null } = {}) {
  const day = {
    id: genId('day'),
    label: label || nextDayLabel(state.program.days),
    weekday: weekday == null ? null : Number(weekday),   // 0=Пн … 6=Вс
    items: [],
  };
  return { state: { ...state, program: { ...state.program, days: [...state.program.days, day] } }, day };
}

/** Правка самого дня (метка, день недели). */
function updateDay(state, dayId, patch) {
  const allowed = ['label', 'weekday'];
  const clean = Object.fromEntries(Object.entries(patch).filter(([k]) => allowed.includes(k)));
  return mapDay(state, dayId, (d) => ({ ...d, ...clean }));
}

function deleteDay(state, dayId) {
  return { ...state, program: { ...state.program, days: state.program.days.filter((d) => d.id !== dayId) } };
}

function addDayItem(state, dayId, item) {
  const it = normalizeItem(item);
  return mapDay(state, dayId, (d) => ({ ...d, items: [...d.items, it] }));
}

function updateDayItem(state, dayId, index, patch) {
  const allowed = ['exerciseId', 'repRangeMin', 'repRangeMax', 'workSets', 'targetRIR', 'restSec'];
  const clean = Object.fromEntries(Object.entries(patch).filter(([k]) => allowed.includes(k)));
  return mapDay(state, dayId, (d) => {
    if (index < 0 || index >= d.items.length) throw new Error('Нет элемента #' + index);
    return { ...d, items: d.items.map((it, i) => (i === index ? { ...it, ...clean } : it)) };
  });
}

function removeDayItem(state, dayId, index) {
  return mapDay(state, dayId, (d) => ({ ...d, items: d.items.filter((_, i) => i !== index) }));
}

function moveDayItem(state, dayId, index, dir) {
  return mapDay(state, dayId, (d) => {
    const items = d.items.slice();
    const j = index + dir;
    if (j < 0 || j >= items.length) return d;
    [items[index], items[j]] = [items[j], items[index]];
    return { ...d, items };
  });
}

/* ---------- пользовательские упражнения ---------- */

function addCustomExercise(state, ex) {
  if (!ex || !ex.name || !ex.name.trim()) throw new Error('Нужно название упражнения');
  const exercise = {
    id: genId('cx'),
    name: ex.name.trim(),
    primaryMuscle: ex.primaryMuscle || 'chest',
    secondaryMuscles: Array.isArray(ex.secondaryMuscles) ? ex.secondaryMuscles : [],
    kind: ex.kind === 'compound' ? 'compound' : 'isolation',
    weightStep: Number(ex.weightStep) || state.settings.weightStepDefault,
    isCustom: true,
  };
  return { state: { ...state, exercises: [...state.exercises, exercise] }, exercise };
}

function deleteCustomExercise(state, id) {
  const ex = state.exercises.find((e) => e.id === id);
  if (!ex) throw new Error('Упражнение не найдено');
  if (!ex.isCustom) throw new Error('Встроенные упражнения удалять нельзя');
  return { ...state, exercises: state.exercises.filter((e) => e.id !== id) };
}

if (typeof module !== 'undefined') {
  module.exports = {
    STORAGE_KEY, SCHEMA_VERSION,
    defaultState, load, save, validateState, mergeLibrary,
    exportBackup, importBackup, backupOverdue,
    startSession, logSet, updateSet, deleteSet,
    exerciseHistory, genId,
    nextDayLabel, addDay, updateDay, deleteDay,
    addDayItem, updateDayItem, removeDayItem, moveDayItem,
    addCustomExercise, deleteCustomExercise,
  };
}

  <script>
/* ============================================================
 * engine.js — движок прогрессии (чистые функции, без DOM)
 * Контракт (аналоги endpoints):
 *   recommend(exerciseId, setNo, ctx)  GET  /recommendation
 *   calibrate(probeSet, ctx)           POST /calibration
 *   mesoStatus(state)                  GET  /mesocycle
 *   advanceWeek(state, opts)           POST /mesocycle/advance
 *   shiftDeload(state, delta)          POST /mesocycle/shift
 *   context(state, exerciseId, item)   helper: собирает ctx из state
 *
 * ctx для recommend: { meso, item, exercise, history }
 *   meso     — результат mesoStatus(state)
 *   item     — элемент DayTemplate: { repRangeMin, repRangeMax, workSets, targetRIR, restSec }
 *   exercise — { weightStep, ... } из библиотеки
 *   history  — store.exerciseHistory(...) (новые первыми, без калибровок)
 *
 * Все функции чистые: не пишут в store, не трогают DOM. Мутирующие
 * (advanceWeek/shiftDeload) принимают state и возвращают новый state.
 *
 * Параметры движка зафиксированы в CLAUDE.md:
 *   - RIR-рампа: нед.1→3, нед.2–3→2, нед.4–5→1, делоуд→4
 *   - Перегруз: RIR 0 в 2+ сетах → удержание; повторно → −5%
 *   - Делоуд: 60% рабочего веса, 50% сетов
 *   - Прогрессия: все сеты у потолка повторов → +1 шаг веса, возврат к низу
 *   - Калибровка: разведочный подход → проекция по Эпли → контрольный подход
 * ============================================================ */

/* ---------- утилиты ---------- */

/** Округление веса к сетке шага (nearest | floor | ceil). */
function roundToStep(weight, step, mode = 'nearest') {
  if (!step || step <= 0) return weight;
  const n = weight / step;
  const r = mode === 'floor' ? Math.floor(n) : mode === 'ceil' ? Math.ceil(n) : Math.round(n);
  return +(r * step).toFixed(3);
}

/** Оценка 1ПМ по Эпли из подхода до отказа (reps = повторы до отказа). */
function epley1rm(weight, repsToFailure) {
  return weight * (1 + repsToFailure / 30);
}

/** Целевой RIR недели роста (без делоуда). Рампа масштабируется под growWeeks. */
function targetRIRForWeek(weekNo, growWeeks) {
  // нед.1 → RIR 3; следующая треть → RIR 2; последние две пятых → RIR 1
  if (weekNo <= Math.ceil(growWeeks * 0.2)) return 3;   // gw=5: нед.1
  if (weekNo <= Math.ceil(growWeeks * 0.6)) return 2;   // gw=5: нед.2–3
  return 1;                                             // gw=5: нед.4–5
}

/** Краткое текстовое описание результатов сессии для UI/причины. */
function summarize(sets) {
  return {
    sets: sets.map((s) => ({ weight: s.weight, reps: s.reps, rir: s.rir })),
    text: sets
      .map((s) => `${s.weight}×${s.reps}${s.rir != null ? ' RIR' + s.rir : ''}`)
      .join(', '),
  };
}

/* ---------- мезоцикл ---------- */

function mesoStatus(state) {
  const m = state.mesocycle;
  const growWeeks = m.growWeeks || 5;
  const deloadShift = m.deloadShift || 0;
  const deloadWeek = growWeeks + 1 + deloadShift;
  const isDeload = m.weekNo >= deloadWeek;
  const targetRIR = isDeload ? 4 : targetRIRForWeek(m.weekNo, growWeeks);
  return { cycleNo: m.cycleNo, weekNo: m.weekNo, growWeeks, deloadShift, deloadWeek, isDeload, targetRIR };
}

/** Переход на следующую неделю; после делоуда — новый цикл (weekNo=1). */
function advanceWeek(state, { now = new Date() } = {}) {
  const m = state.mesocycle;
  const growWeeks = m.growWeeks || 5;
  const deloadWeek = growWeeks + 1 + (m.deloadShift || 0);
  if (m.weekNo >= deloadWeek) {
    return {
      ...state,
      mesocycle: { ...m, cycleNo: m.cycleNo + 1, weekNo: 1, deloadShift: 0, startedAt: now.toISOString() },
    };
  }
  return { ...state, mesocycle: { ...m, weekNo: m.weekNo + 1 } };
}

/** Ручной сдвиг делоуда ±1 неделя (риск из PRD). Клампится к [-1, +1]. */
function shiftDeload(state, delta) {
  const cur = state.mesocycle.deloadShift || 0;
  const next = Math.max(-1, Math.min(1, cur + delta));
  return { ...state, mesocycle: { ...state.mesocycle, deloadShift: next } };
}

/* ---------- сбор контекста из state ---------- */

/**
 * Собирает ctx для recommend из полного state.
 * exerciseHistory — функция store.exerciseHistory (инъекция, чтобы не тянуть store).
 */
function context(state, exerciseId, item, exerciseHistoryFn) {
  const meso = mesoStatus(state);
  const exercise = state.exercises.find((e) => e.id === exerciseId) || { weightStep: state.settings.weightStepDefault };
  const history = exerciseHistoryFn
    ? exerciseHistoryFn(state, exerciseId, { includeCalibration: false, limit: 10 })
    : [];
  return { meso, item, exercise, history };
}

/* ---------- калибровка нового упражнения ---------- */

/**
 * Проекция рабочего веса из разведочного подхода по Эпли.
 * probeSet: { weight, reps, rir } — не до отказа (reps до отказа = reps + rir).
 * ctx: { targetReps, targetRIR, weightStep }
 * → { weight, e1rm, confidence, targetReps, targetRIR, reason }
 */
function calibrate(probeSet, ctx) {
  const targetReps = ctx.targetReps;
  const targetRIR = ctx.targetRIR == null ? 2 : ctx.targetRIR;
  const step = ctx.weightStep || 2.5;

  const probeEff = Number(probeSet.reps) + Number(probeSet.rir == null ? 0 : probeSet.rir);
  const e1rm = epley1rm(Number(probeSet.weight), probeEff);
  const targetEff = targetReps + targetRIR;
  const raw = e1rm / (1 + targetEff / 30);
  const weight = roundToStep(raw, step);

  // уверенность падает с ростом дистанции экстраполяции и вне окна 10–15 повторов
  let confidence = 0.9 - Math.abs(probeEff - targetEff) * 0.03;
  if (probeSet.reps < 8 || probeSet.reps > 18) confidence -= 0.2;
  confidence = Math.max(0.3, Math.min(0.95, confidence));

  return {
    weight,
    e1rm: +e1rm.toFixed(1),
    confidence: +confidence.toFixed(2),
    targetReps,
    targetRIR,
    reason: `Проекция по Эпли: e1RM≈${e1rm.toFixed(1)} кг → ${weight} кг под ${targetReps}×RIR${targetRIR}. Подтверди контрольным подходом.`,
  };
}

/* ---------- рекомендация на подход ---------- */

/**
 * Рекомендация веса/повторов/RIR на следующий подход.
 * → { weight, reps, targetRIR, reason, isDeload, needsCalibration, lastResult }
 * weight === null при needsCalibration (истории нет).
 */
function recommend(exerciseId, setNo, ctx) {
  const { meso, item, exercise } = ctx;
  const step = exercise.weightStep || 2.5;
  const targetRIR = meso.targetRIR;

  // сессии с рабочими (не калибровочными) сетами, без делоуда, новые первыми
  const history = (ctx.history || []).filter(
    (h) => !h.isDeload && h.sets.some((s) => !s.isCalibration)
  );

  // нет истории → режим калибровки
  if (history.length === 0) {
    return {
      weight: null,
      reps: item.repRangeMin,
      targetRIR,
      isDeload: meso.isDeload,
      needsCalibration: true,
      lastResult: null,
      reason: 'Нет истории по упражнению — нужна калибровка (разведочный подход).',
    };
  }

  const last = history[0];
  const lastWork = last.sets.filter((s) => !s.isCalibration);
  const workWeight = Math.max(...lastWork.map((s) => s.weight));
  const lastResult = summarize(lastWork);

  // делоуд: 60% рабочего веса, низ диапазона; число сетов (50%) решает UI
  if (meso.isDeload) {
    const w = roundToStep(workWeight * 0.6, step);
    return {
      weight: w,
      reps: item.repRangeMin,
      targetRIR,
      isDeload: true,
      needsCalibration: false,
      lastResult,
      reason: `Делоуд: 60% рабочего веса (${workWeight}→${w} кг), половина сетов, RIR ${targetRIR}.`,
    };
  }

  // перегруз: RIR 0 в 2+ рабочих сетах сессии
  const overreach = (sess) =>
    !!sess && sess.sets.filter((s) => !s.isCalibration && s.rir === 0).length >= 2;
  const lastOver = overreach(last);
  const prevOver = overreach(history[1]);

  // повторный перегруз (две сессии подряд) → −5%
  if (lastOver && prevOver) {
    const w = roundToStep(workWeight * 0.95, step); // nearest: ближе к целевым −5%, чем floor
    return {
      weight: w,
      reps: item.repRangeMin,
      targetRIR,
      isDeload: false,
      needsCalibration: false,
      lastResult,
      reason: `Повторный перегруз (RIR 0) — снижаем 5% (${workWeight}→${w} кг).`,
    };
  }

  // одиночный перегруз → удержание веса
  if (lastOver) {
    return {
      weight: workWeight,
      reps: item.repRangeMax,
      targetRIR,
      isDeload: false,
      needsCalibration: false,
      lastResult,
      reason: 'Фактическое усилие выше целевого (RIR 0) — закрепляем вес.',
    };
  }

  // двойная прогрессия: все рабочие сеты у потолка повторов → +шаг веса, возврат к низу
  const allCeiling = lastWork.length > 0 && lastWork.every((s) => s.reps >= item.repRangeMax);
  if (allCeiling) {
    const w = roundToStep(workWeight + step, step);
    return {
      weight: w,
      reps: item.repRangeMin,
      targetRIR,
      isDeload: false,
      needsCalibration: false,
      lastResult,
      reason: `Все сеты у потолка (${item.repRangeMax}) — +${step} кг, возврат к ${item.repRangeMin} повт.`,
    };
  }

  // иначе — тот же вес, добавляем повторы (цель — потолок диапазона)
  const maxReps = Math.max(...lastWork.map((s) => s.reps));
  const targetReps = Math.min(Math.max(maxReps + 1, item.repRangeMin), item.repRangeMax);
  return {
    weight: workWeight,
    reps: targetReps,
    targetRIR,
    isDeload: false,
    needsCalibration: false,
    lastResult,
    reason: `Двойная прогрессия — тот же вес, цель +повторы (до ${item.repRangeMax}).`,
  };
}

/* export для node-тестов; в браузере — глобальные объявления */
if (typeof module !== 'undefined') {
  module.exports = {
    roundToStep,
    epley1rm,
    targetRIRForWeek,
    mesoStatus,
    advanceWeek,
    shiftDeload,
    context,
    calibrate,
    recommend,
  };
}

  <script>
/* ============================================================
 * analytics.js — аналитика (чистые функции без DOM)
 * Контракт (аналоги endpoints):
 *   e1rmSeries(state, exerciseId, opts)   GET /analytics/e1rm
 *   weeklyVolume(state, opts)             GET /analytics/volume
 *   stagnation(state, opts)               GET /analytics/stagnation
 *
 * Единообразие e1RM (подтверждено пользователем): одна формула Эпли из
 * engine.js; RIR всегда приводится к повторам до отказа (reps + rir).
 * ============================================================ */

/* engine в node — через require; в браузере epley1rm — глобаль */
var _ANALYTICS_ENGINE = (typeof module !== 'undefined') ? require('./engine.js') : null;

/** Единая точка расчёта e1RM: вес × повторы-до-отказа по Эпли. */
function e1rm(weight, reps, rir) {
  const rtf = Number(reps) + (rir == null ? 0 : Number(rir));
  const fn = _ANALYTICS_ENGINE ? _ANALYTICS_ENGINE.epley1rm : epley1rm;
  return fn(Number(weight), rtf);
}

const MUSCLE_ORDER = ['chest', 'back', 'legs', 'shoulders', 'arms', 'core'];
const VOLUME_CORRIDOR = [10, 20];

/* ---------- недели (UTC, детерминизм независимо от tz) ---------- */

function startOfWeek(d) {
  const x = new Date(d);
  const day = (x.getUTCDay() + 6) % 7;       // Пн = 0
  x.setUTCHours(0, 0, 0, 0);
  x.setUTCDate(x.getUTCDate() - day);
  return x;
}
function weekKey(d) {
  return startOfWeek(d).toISOString().slice(0, 10);
}

/* ---------- e1RM: ряд «сессия → лучший e1RM» ---------- */

/** Лучший e1RM среди набора сетов (по одному упражнению). */
function bestE1rm(sets) {
  let best = 0;
  for (const s of sets) {
    const v = e1rm(s.weight, s.reps, s.rir);
    if (v > best) best = v;
  }
  return best;
}

/**
 * Ряд e1RM по сессиям (по возрастанию даты).
 * Точка: { date, weekNo, isDeload, e1rm, isCalibration }.
 * Для тренда берём лучший рабочий сет; если в сессии были только
 * калибровочные — точка помечается isCalibration.
 */
function e1rmSeries(state, exerciseId) {
  const sessions = [...state.sessions].sort((a, b) => new Date(a.date) - new Date(b.date));
  const out = [];
  for (const ses of sessions) {
    const all = ses.sets.filter((s) => s.exerciseId === exerciseId);
    if (!all.length) continue;
    const work = all.filter((s) => !s.isCalibration);
    const isCal = work.length === 0;
    const best = bestE1rm(isCal ? all : work);
    out.push({
      date: ses.date,
      weekNo: ses.weekNo,
      isDeload: !!ses.isDeload,
      e1rm: +best.toFixed(1),
      isCalibration: isCal,
    });
  }
  return out;
}

/* ---------- недельный объём по мышечным группам ---------- */

/**
 * Число рабочих сетов по primaryMuscle за неделю (weekOffset назад от now).
 * → { weekStart, byMuscle: [{ muscle, count, status }] }
 * status: 'low' (<10) | 'ok' | 'high' (>20).
 */
function weeklyVolume(state, { now = new Date(), weekOffset = 0, corridor = VOLUME_CORRIDOR } = {}) {
  const start = startOfWeek(now);
  start.setUTCDate(start.getUTCDate() - weekOffset * 7);
  const startMs = start.getTime();
  const endMs = startMs + 7 * 86400000;

  const muscleOf = {};
  for (const ex of state.exercises) muscleOf[ex.id] = ex.primaryMuscle;

  const counts = Object.fromEntries(MUSCLE_ORDER.map((m) => [m, 0]));
  for (const ses of state.sessions) {
    const ms = new Date(ses.date).getTime();
    if (ms < startMs || ms >= endMs) continue;
    for (const s of ses.sets) {
      if (s.isCalibration) continue;
      const m = muscleOf[s.exerciseId];
      if (m in counts) counts[m] += 1;
    }
  }

  const [lo, hi] = corridor;
  const byMuscle = MUSCLE_ORDER.map((m) => ({
    muscle: m,
    count: counts[m],
    status: counts[m] < lo ? 'low' : counts[m] > hi ? 'high' : 'ok',
  }));
  return { weekStart: start.toISOString().slice(0, 10), byMuscle };
}

/* ---------- детектор стагнации ---------- */

/**
 * Упражнения без роста e1RM minWeeks+ недель (вне делоуда), с допуском.
 * Стагнация: пик e1RM за последние minWeeks недель не превысил пик
 * предыдущих недель более чем на tolerance (доля).
 * → [{ exerciseId, name, weeks, priorPeak, recentPeak, hint }]
 */
function stagnation(state, { minWeeks = 3, tolerance = 0.01, now = new Date() } = {}) {
  const out = [];
  for (const ex of state.exercises) {
    const series = e1rmSeries(state, ex.id).filter((p) => !p.isCalibration && !p.isDeload);
    if (series.length < 2) continue;

    // максимум e1RM по неделям, по возрастанию
    const byWeek = new Map();
    for (const p of series) {
      const k = weekKey(new Date(p.date));
      byWeek.set(k, Math.max(byWeek.get(k) || 0, p.e1rm));
    }
    const weeks = [...byWeek.keys()].sort().map((k) => byWeek.get(k));
    if (weeks.length < minWeeks + 1) continue;   // нужна база + окно наблюдения

    const recent = weeks.slice(-minWeeks);
    const prior = weeks.slice(0, -minWeeks);
    const priorPeak = Math.max(...prior);
    const recentPeak = Math.max(...recent);

    if (recentPeak <= priorPeak * (1 + tolerance)) {
      out.push({
        exerciseId: ex.id,
        name: ex.name,
        weeks: minWeeks,
        priorPeak: +priorPeak.toFixed(1),
        recentPeak: +recentPeak.toFixed(1),
        hint: `e1RM не растёт ${minWeeks}+ нед. Гипотеза (не директива): сменить вариацию, проверить объём/сон/питание.`,
      });
    }
  }
  return out;
}

if (typeof module !== 'undefined') {
  module.exports = {
    e1rm, bestE1rm, e1rmSeries, weeklyVolume, stagnation,
    startOfWeek, weekKey, MUSCLE_ORDER, VOLUME_CORRIDOR,
  };
}

const GEN_F_BOOST = ['hip-thrust', 'romanian-dl', 'bulgarian-split', 'leg-curl', 'seated-leg-curl', 'leg-press', 'walking-lunge', 'calf-raise', 'hyperextension', 'lateral-raise', 'cable-lateral', 'abductor-machine', 'adductor-machine', 'cable-kickback'];
const GEN_M_BOOST = ['bb-bench-press', 'incline-db-press', 'ohp', 'bb-curl', 'hammer-curl', 'incline-db-curl', 'cable-pushdown', 'overhead-ext', 'lateral-raise'];

/* ---------- выбор сплита ---------- */

function genPickSplit(daysPerWeek, pref) {
  const n = Math.min(5, Math.max(2, daysPerWeek));
  const FULL = { 2: ['fullA', 'fullB'], 3: ['fullA', 'fullB', 'fullC'], 4: ['fullA', 'fullB', 'fullC', 'fullA'], 5: ['fullA', 'fullB', 'fullC', 'fullA', 'fullB'] };
  const SPLIT = { 2: ['upper', 'lower'], 3: ['push', 'pull', 'legs'], 4: ['upper', 'lower', 'upper2', 'lower2'], 5: ['upper', 'lower', 'push', 'pull', 'legs'] };
  // авто: ≤3 дней частотнее и эффективнее фулбади; 4–5 — по группам
  const mode = pref === 'full' || (pref !== 'split' && n <= 3) ? FULL : SPLIT;
  return mode[n];
}

/* ---------- оценка длительности тренировки ---------- */

/** Минуты на день: сет ~45с + отдых, плюс ~1.5 мин на смену снаряда. */
function genEstimateMin(items) {
  return items.reduce((m, it) => m + it.workSets * (0.75 + it.restSec / 60) + 1.5, 0);
}

/* ---------- генерация ---------- */

function generateProgram(opts, library) {
  const sex = opts.sex === 'f' ? 'f' : 'm';
  const goal = GEN_GOALS[opts.goal] ? opts.goal : 'hypertrophy';
  const g = GEN_GOALS[goal];
  const minutes = Number(opts.minutes) || 60;
  const budget = Math.max(25, minutes - 8);           // минус разминка
  const byId = {};
  for (const e of library) byId[e.id] = e;
  const boost = sex === 'f' ? GEN_F_BOOST : GEN_M_BOOST;

  const keys = genPickSplit(opts.daysPerWeek, opts.split || 'auto');
  const seenLabels = new Set();

  const days = keys.map((key, di) => {
    // приоритет: позиция в пуле, акцент пола −1.5; для «силы» изоляция −в конец
    const scored = GEN_POOLS[key]
      .filter((id) => byId[id])
      .map((id, i) => {
        // первый в пуле — якорный компаунд дня, всегда идёт первым
        if (i === 0) return { id, score: -1000 };
        let score = i;
        if (boost.includes(id)) score -= 1.5;                 // акцент по полу
        // растянутая позиция приоритетна для роста (Wolf 2025); при цели «сила»
        // первичен тяжёлый компаунд — стретч-бонус не применяем
        if (goal !== 'strength' && GEN_STRETCH.has(id)) score -= 1;
        if (goal === 'strength' && byId[id].kind === 'isolation') score += 3;
        return { id, score };
      })
      .sort((a, b) => a.score - b.score);

    // собираем упражнения, пока влезаем в бюджет времени (минимум 3)
    const items = [];
    for (const { id } of scored) {
      const p = byId[id].kind === 'compound' ? g.compound : g.isolation;
      const item = {
        exerciseId: id,
        repRangeMin: p.min, repRangeMax: p.max,
        workSets: p.sets, targetRIR: 2, restSec: p.rest,
      };
      if (items.length >= 3 && genEstimateMin([...items, item]) > budget) continue;
      items.push(item);
      if (genEstimateMin(items) >= budget) break;
    }

    // метка: у сплитов своя, у фулбади при повторе ключа — следующая буква
    let label = GEN_LABELS[key] || 'ABCDE'[di];
    while (seenLabels.has(label)) label = 'ABCDE'[di] || label + '′';
    seenLabels.add(label);

    return { key, label, items, estMinutes: Math.round(genEstimateMin(items)) };
  });

  const note = `${g.label}: ${g.hint}. Объём ~10–20 сетов/группу в неделю, каждая группа ≥2×/нед, `
    + `приоритет упражнениям в растянутой позиции (данные 2025–2026). `
    + (sex === 'f' ? 'Акцент: ноги/ягодичные/дельты.' : 'Акцент: грудь/спина/руки.');

  return { days, note, goal, sex, minutes };
}

/* export для node-тестов; в браузере — глобальные объявления */
if (typeof module !== 'undefined') {
  module.exports = { GEN_GOALS, GEN_POOLS, GEN_LABELS, GEN_STRETCH, genPickSplit, genEstimateMin, generateProgram };
}

</script>
  <script>
/* ============================================================
 * ui-workout.js — экран активной тренировки + таймер отдыха
 * DOM-код изолирован в initWorkout(); чистые хелперы экспортируются
 * отдельно (тестируются node-ом без DOM).
 *
 * Зависимости в браузере — глобальные функции store.js/engine.js
 * (startSession/logSet/save/getExercise/exerciseHistory, recommend/
 * calibrate/mesoStatus/context). В node инъектируются через opts.
 *
 * ВРЕМЕННО (до чанка 6): захардкожен демо-день A и стартует свежая
 * сессия при монтировании. Реальный выбор дня/сессии — конструктор
 * (чанк 4) и app.js (чанк 6).
 * ============================================================ */

/* ---------- демо-день A (заглушка до конструктора) ---------- */

function demoDayA() {
  return {
    id: 'day-a',
    label: 'A',
    items: [
      { exerciseId: 'bb-bench-press', repRangeMin: 6,  repRangeMax: 10, workSets: 3, targetRIR: 2, restSec: 180 },
      { exerciseId: 'bb-row',         repRangeMin: 8,  repRangeMax: 12, workSets: 3, targetRIR: 2, restSec: 150 },
      { exerciseId: 'ohp',            repRangeMin: 8,  repRangeMax: 12, workSets: 3, targetRIR: 2, restSec: 150 },
      { exerciseId: 'bb-curl',        repRangeMin: 10, repRangeMax: 15, workSets: 3, targetRIR: 2, restSec: 90  },
    ],
  };
}

/* ---------- дни недели ---------- */

const WEEKDAYS = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];   // индекс 0=Пн … 6=Вс

/** JS getDay() (0=Вс) → наш индекс (0=Пн). */
function todayIdx(now = new Date()) {
  return (now.getDay() + 6) % 7;
}

/** День программы, назначенный на этот день недели (или null). */
function pickDayForDate(days, idx) {
  return (days || []).find((d) => d.weekday === idx) || null;
}

/* ---------- чистые хелперы (тестируемые) ---------- */

/** Поле ввода подхода: подпись + [−][input][+] на всю ширину. */
function entryField(exId, field, label, value, p, step, mode, min, max) {
  const mn = min != null ? ` min="${min}"` : '';
  const mx = max != null ? ` max="${max}"` : '';
  return `<div class="ef">
    <span class="ef-lbl">${label}</span>
    <div class="ef-ctrl">
      <button class="step" data-act="${p}-" data-ex="${exId}">−</button>
      <input class="val-in" type="number" inputmode="${mode}" step="${step}"${mn}${mx} data-field="${field}" data-ex="${exId}" value="${value}">
      <button class="step" data-act="${p}+" data-ex="${exId}">+</button>
    </div>
  </div>`;
}

/** Краткий текст результатов сессии: "60×10 RIR2, 60×9 RIR2". */
function setsText(sets) {
  return sets.map((s) => `${s.weight}×${s.reps}${s.rir != null ? ' RIR' + s.rir : ''}`).join(', ');
}

/** Секунды → "m:ss". */
function fmtClock(sec) {
  const s = Math.max(0, Math.round(sec));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r < 10 ? '0' : ''}${r}`;
}

/** Остаток таймера отдыха в секундах, не меньше 0. */
function computeRemaining(endTs, now) {
  return Math.max(0, Math.ceil((endTs - now) / 1000));
}

/** Шаг степпера с клампом к [min, max]; точность приводится к сетке шага. */
function clampStep(value, delta, step, min, max) {
  let v = +(Number(value) + delta * step).toFixed(3);
  if (min != null && v < min) v = min;
  if (max != null && v > max) v = max;
  return v;
}

/** Прогресс дня: сколько рабочих сетов сделано из плановых. */
function dayProgress(day, sessionSets) {
  let done = 0, total = 0;
  for (const it of day.items) {
    total += it.workSets;
    done += sessionSets.filter((s) => s.exerciseId === it.exerciseId && !s.isCalibration).length;
  }
  return { done: Math.min(done, total), total };
}

/**
 * Что показывать по упражнению сейчас (чистая функция).
 * exSets — сеты этого упражнения в текущей сессии (по порядку добавления).
 * ctx — как для recommend: { meso, item, exercise, history }.
 * engine — { recommend, calibrate }.
 * → { mode: 'probe'|'control'|'work'|'done', rec?, calibration?, done? }
 */
function planExercise(item, exSets, ctx, engine) {
  const work = exSets.filter((s) => !s.isCalibration);
  const probe = exSets.find((s) => s.isCalibration);
  const hasHistory = (ctx.history || []).some(
    (h) => !h.isDeload && h.sets.some((s) => !s.isCalibration)
  );

  if (work.length >= item.workSets) return { mode: 'done', done: work.length };

  // калибровочный сценарий: истории нет
  if (!hasHistory && !ctx.meso.isDeload) {
    if (!probe) {
      return {
        mode: 'probe',
        rec: {
          weight: null,
          reps: Math.round((item.repRangeMin + item.repRangeMax) / 2),
          targetRIR: 4,
          reason: 'Разведочный подход: 10–15 повторов, НЕ до отказа. Он калибровочный.',
        },
      };
    }
    if (work.length === 0) {
      const target = Math.round((item.repRangeMin + item.repRangeMax) / 2);
      const cal = engine.calibrate(probe, {
        targetReps: target,
        targetRIR: ctx.meso.targetRIR,
        weightStep: ctx.exercise.weightStep,
      });
      return {
        mode: 'control',
        calibration: cal,
        rec: { weight: cal.weight, reps: target, targetRIR: ctx.meso.targetRIR, reason: cal.reason },
      };
    }
    // контрольный сделан — продолжаем от последнего рабочего веса
    const prev = work[work.length - 1];
    return {
      mode: 'work',
      rec: {
        weight: prev.weight,
        reps: Math.min(prev.reps, item.repRangeMax),
        targetRIR: ctx.meso.targetRIR,
        reason: 'Калибровка подтверждена — держим вес.',
      },
    };
  }

  // обычная рекомендация
  const rec = engine.recommend(item.exerciseId, work.length + 1, ctx);
  if (work.length > 0) {
    // автоподстановка прошлого сета этой сессии
    const prev = work[work.length - 1];
    return { mode: 'work', rec: { ...rec, weight: prev.weight } };
  }
  return { mode: 'work', rec };
}

/* ---------- DOM: монтирование экрана (браузер) ---------- */

function initWorkout(root, opts = {}) {
  const S = opts.store || {
    startSession, logSet, save, getExercise, exerciseHistory,
  };
  const E = opts.engine || { recommend, calibrate, mesoStatus, context };
  const onCommit = opts.onCommit || function () {};

  let state = opts.state;
  const allDays = (state.program.days && state.program.days.length) ? state.program.days : null;
  const meso = E.mesoStatus(state);

  // программы нет → подсказка вместо экрана
  if (!allDays && !opts.day) {
    root.innerHTML = `<div class="placeholder">Программы пока нет.<br>Создай её во вкладке <b>«Программа»</b>: количество тренировок → дни недели → упражнения.</div>`;
    return { render: () => {}, stopRest: () => {} };
  }

  // день по умолчанию: назначенный на сегодня день недели, иначе первый
  let day = opts.day || pickDayForDate(allDays, todayIdx()) || allDays[0];

  let session = null;      // ленивая: создаётся при первом залоге
  const drafts = {};       // exId -> { weight, reps, rir, mode }
  let timer = null;        // { endTs, restSec, handle }

  // возобновляем сегодняшнюю сессию этого дня, если она уже начата
  function resumeSession() {
    const today = new Date().toISOString().slice(0, 10);
    session = state.sessions.find((s) => s.dayId === day.id && String(s.date).slice(0, 10) === today) || null;
  }
  resumeSession();

  function setDay(dayId) {
    const d = (allDays || []).find((x) => x.id === dayId);
    if (!d || d === day) return;
    day = d;
    stopRest(false); timer = null;
    for (const k of Object.keys(drafts)) delete drafts[k];
    resumeSession();
    render();
  }

  function ensureSession() {
    if (!session) {
      const r = S.startSession(state, day.id, { isDeload: meso.isDeload });
      state = r.state;
      session = r.session;
    }
    return session;
  }
  function liveSession() {
    if (!session) return { sets: [] };
    return state.sessions.find((s) => s.id === session.id);
  }
  function exSets(exId) {
    return liveSession().sets.filter((s) => s.exerciseId === exId);
  }
  function ctxFor(item) {
    return E.context(state, item.exerciseId, item, S.exerciseHistory);
  }
  function planFor(item) {
    return planExercise(item, exSets(item.exerciseId), ctxFor(item), E);
  }
  function ensureDraft(item, plan) {
    const id = item.exerciseId;
    if (!drafts[id] || drafts[id].mode !== plan.mode) {
      drafts[id] = {
        mode: plan.mode,
        weight: plan.rec && plan.rec.weight != null ? plan.rec.weight
          : (exSets(id).slice(-1)[0]?.weight ?? item._lastW ?? 20),
        reps: plan.rec ? plan.rec.reps : item.repRangeMin,
        rir: plan.rec ? plan.rec.targetRIR : 2,
      };
    }
    return drafts[id];
  }

  /* --- рендер --- */
  function render() {
    const prog = dayProgress(day, liveSession().sets);
    const parts = [];

    // переключатель дней (если их больше одного); сегодняшний помечается
    if (allDays && allDays.length > 1) {
      const tIdx = todayIdx();
      parts.push(`<div class="day-tabs">${allDays.map((d) => `
        <button class="day-tab${d.id === day.id ? ' on' : ''}" data-act="switch-day" data-day="${d.id}">
          ${d.label}${d.weekday != null ? ' · ' + WEEKDAYS[d.weekday] : ''}${d.weekday === tIdx ? ' ●' : ''}
        </button>`).join('')}</div>`);
    }

    const wd = day.weekday != null ? ' · ' + WEEKDAYS[day.weekday] : '';
    parts.push(`
      <header class="wk-head">
        <div>
          <div class="wk-title">День ${day.label}${wd} · Неделя ${meso.weekNo}${meso.isDeload ? ' · ДЕЛОУД' : ''}</div>
          <div class="wk-sub">Цель недели: RIR ${meso.targetRIR}</div>
        </div>
        <div class="wk-prog">${prog.done}/${prog.total}</div>
      </header>`);

    for (const item of day.items) {
      const ex = S.getExercise(state, item.exerciseId) || { name: item.exerciseId, weightStep: 2.5 };
      const plan = planFor(item);
      const logged = exSets(item.exerciseId);
      const badge = plan.mode === 'probe' ? '<span class="badge cal">калибровка</span>'
        : plan.mode === 'control' ? '<span class="badge cal">контроль</span>'
        : plan.mode === 'done' ? '<span class="badge ok">готово</span>' : '';

      const rows = logged.map((s, i) => `
        <div class="set-row done">
          <span class="set-no">${s.isCalibration ? 'кал.' : '#' + (i + 1)}</span>
          <span class="set-res">${s.weight} кг × ${s.reps}${s.rir != null ? ' · RIR ' + s.rir : ''}</span>
          <button class="mini" data-act="undo" data-set="${s.id}">✕</button>
        </div>`).join('');

      // прошлая сессия по этому упражнению (без калибровочных)
      const hist = S.exerciseHistory(state, item.exerciseId, { limit: 2 })
        .filter((h) => !h.sets.some((s) => logged.some((l) => l.id === s.id)))[0];
      const prevLine = hist
        ? `<div class="prev-line">Прошлый раз (${String(hist.date).slice(0, 10)}): ${setsText(hist.sets)}</div>`
        : '';

      let active = '';
      if (plan.mode !== 'done') {
        const d = ensureDraft(item, plan);
        const recVals = plan.rec && plan.rec.weight != null
          ? `<b>Рекомендация: ${plan.rec.weight} кг × ${plan.rec.reps} · RIR ${plan.rec.targetRIR}</b><br>`
          : '';
        active = `
          <div class="rec-line">${recVals}${plan.rec ? plan.rec.reason : ''}</div>
          <div class="entry" data-ex="${item.exerciseId}">
            ${entryField(item.exerciseId, 'weight', 'Вес, кг', d.weight, 'w', ex.weightStep || 2.5, 'decimal', 0, null)}
            ${entryField(item.exerciseId, 'reps', 'Повторы', d.reps, 'r', 1, 'numeric', 1, null)}
            ${entryField(item.exerciseId, 'rir', 'RIR (в запасе)', d.rir, 'i', 1, 'numeric', 0, 5)}
            <button class="log-wide" data-act="log" data-ex="${item.exerciseId}">✓ Записать подход</button>
          </div>`;
      }

      parts.push(`
        <section class="ex-card${plan.mode === 'done' ? ' complete' : ''}">
          <div class="ex-head">
            <div class="ex-name">${ex.name} ${badge}</div>
            <div class="ex-meta">${item.repRangeMin}–${item.repRangeMax} повт · ${item.workSets} сетов · отдых ${fmtClock(item.restSec)}
              · <a class="vid-link" href="${videoUrl(ex)}" target="_blank" rel="noopener">🎬 видео</a></div>
          </div>
          ${prevLine}
          ${rows}
          ${active}
        </section>`);
    }

    root.innerHTML = `<div class="wk-screen">${parts.join('')}</div>${timerHtml()}`;
  }

  function timerHtml() {
    if (!timer) return '';
    const rem = computeRemaining(timer.endTs, Date.now());
    const pct = Math.round((1 - rem / timer.restSec) * 100);
    const over = rem <= 0;
    return `
      <div class="rest-bar${over ? ' over' : ''}">
        <div class="rest-fill" style="width:${Math.min(100, pct)}%"></div>
        <div class="rest-txt">${over ? 'Отдых окончен' : 'Отдых ' + fmtClock(rem)}</div>
        <button class="rest-add" data-act="rest+">+15с</button>
        <button class="rest-skip" data-act="rest-skip">${over ? 'Ок' : 'Пропустить'}</button>
      </div>`;
  }

  /* --- таймер отдыха --- */
  // перерисовываем только полоску таймера, а не весь экран —
  // иначе ручной ввод в поле стирается каждые 250мс
  function paintTimer() {
    const bar = root.querySelector('.rest-bar');
    if (!timer || !bar) { render(); return; }
    const rem = computeRemaining(timer.endTs, Date.now());
    const over = rem <= 0;
    const pct = Math.round((1 - rem / timer.restSec) * 100);
    bar.classList.toggle('over', over);
    const fill = bar.querySelector('.rest-fill'); if (fill) fill.style.width = Math.min(100, pct) + '%';
    const txt = bar.querySelector('.rest-txt'); if (txt) txt.textContent = over ? 'Отдых окончен' : 'Отдых ' + fmtClock(rem);
    const skip = bar.querySelector('.rest-skip'); if (skip) skip.textContent = over ? 'Ок' : 'Пропустить';
  }

  function startRest(restSec) {
    stopRest(false);
    timer = { endTs: Date.now() + restSec * 1000, restSec, handle: null, dinged: false };
    timer.handle = setInterval(() => {
      const rem = computeRemaining(timer.endTs, Date.now());
      if (rem <= 0 && !timer.dinged) { timer.dinged = true; beep(); buzz(); }
      if (rem <= 0) { clearInterval(timer.handle); timer.handle = null; }
      paintTimer();
    }, 250);
    render();
  }
  function stopRest(rerender = true) {
    if (timer && timer.handle) clearInterval(timer.handle);
    timer = null;
    if (rerender) render();
  }

  /* --- события --- */
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const exId = btn.dataset.ex;

    if (act === 'switch-day') { setDay(btn.dataset.day); return; }
    if (act === 'rest+') { if (timer) { timer.endTs += 15000; timer.restSec += 15; if (!timer.handle) startRest(computeRemaining(timer.endTs, Date.now())); render(); } return; }
    if (act === 'rest-skip') { stopRest(); return; }
    if (act === 'undo') { removeSet(btn.dataset.set); return; }

    const item = day.items.find((i) => i.exerciseId === exId);
    if (!item) return;
    const ex = S.getExercise(state, exId) || { weightStep: 2.5 };
    const d = drafts[exId];
    if (!d) return;

    if (act === 'w-') d.weight = clampStep(d.weight, -1, ex.weightStep || 2.5, 0, null);
    else if (act === 'w+') d.weight = clampStep(d.weight, +1, ex.weightStep || 2.5, 0, null);
    else if (act === 'r-') d.reps = clampStep(d.reps, -1, 1, 1, 50);
    else if (act === 'r+') d.reps = clampStep(d.reps, +1, 1, 1, 50);
    else if (act === 'i-') d.rir = clampStep(d.rir, -1, 1, 0, 5);
    else if (act === 'i+') d.rir = clampStep(d.rir, +1, 1, 0, 5);
    else if (act === 'log') { logCurrent(item, d); return; }
    render();
  });

  // ручной ввод: пока печатают — обновляем черновик без render (не теряем каретку)
  root.addEventListener('input', (e) => {
    const inp = e.target.closest('.val-in');
    if (!inp) return;
    const d = drafts[inp.dataset.ex];
    if (!d) return;
    const v = parseFloat(inp.value);
    if (!isNaN(v)) d[inp.dataset.field] = v;
  });
  // по завершении ввода — клампим и показываем очищенное значение (без render)
  root.addEventListener('change', (e) => {
    const inp = e.target.closest('.val-in');
    if (!inp) return;
    const d = drafts[inp.dataset.ex];
    if (!d) return;
    const f = inp.dataset.field;
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = f === 'reps' ? 1 : 0;
    if (f === 'weight') v = Math.max(0, v);
    else if (f === 'reps') v = Math.max(1, Math.round(v));
    else if (f === 'rir') v = Math.min(5, Math.max(0, Math.round(v)));
    d[f] = v;
    inp.value = v;
  });

  function logCurrent(item, d) {
    ensureSession();
    const setNo = exSets(item.exerciseId).length + 1;
    const res = S.logSet(state, session.id, {
      exerciseId: item.exerciseId,
      setNo,
      weight: d.weight,
      reps: d.reps,
      rir: d.rir,
      isCalibration: d.mode === 'probe',
    });
    state = res.state;
    S.save(state);
    onCommit(state);
    delete drafts[item.exerciseId];
    startRest(item.restSec);
  }

  function removeSet(setId) {
    // локальная правка: удаляем сет из сессии и пересохраняем
    if (!session) return;
    const sess = liveSession();
    sess.sets = sess.sets.filter((s) => s.id !== setId);
    S.save(state);
    onCommit(state);
    render();
  }

  render();
  return { render, stopRest };
}

/* ---------- сигналы окончания отдыха ---------- */

let _audioCtx = null;
function beep() {
  try {
    if (typeof AudioContext === 'undefined' && typeof webkitAudioContext === 'undefined') return;
    _audioCtx = _audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = _audioCtx.createOscillator();
    const g = _audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 880;
    g.gain.value = 0.001;
    o.connect(g); g.connect(_audioCtx.destination);
    const t = _audioCtx.currentTime;
    g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.start(t); o.stop(t + 0.36);
  } catch (_) { /* тишина, если звук недоступен */ }
}
function buzz() {
  try { if (navigator && navigator.vibrate) navigator.vibrate([120, 60, 120]); } catch (_) {}
}

if (typeof module !== 'undefined') {
  module.exports = {
    demoDayA, fmtClock, computeRemaining, clampStep, dayProgress, planExercise, initWorkout,
    WEEKDAYS, todayIdx, pickDayForDate, setsText,
  };
}

/** Дефолтные параметры элемента дня под тип упражнения. */
function defaultItemFor(ex) {
  const iso = ex.kind === 'isolation';
  return {
    exerciseId: ex.id,
    repRangeMin: iso ? 10 : 6,
    repRangeMax: iso ? 15 : 10,
    workSets: 3,
    targetRIR: 2,
    restSec: ex.kind === 'compound' ? 150 : 90,
  };
}

/** Короткое описание элемента дня для строки списка. */
function itemSummary(item, ex) {
  const name = ex ? ex.name : item.exerciseId;
  return `${name} · ${item.repRangeMin}–${item.repRangeMax}×${item.workSets} · RIR ${item.targetRIR} · ${item.restSec}с`;
}

/** Стартовая программа (день A) — засев пустой программы (заменит демо чанка 6). */
function starterProgram() {
  return [{
    id: 'day-a',
    label: 'A',
    items: [
      { exerciseId: 'bb-bench-press', repRangeMin: 6,  repRangeMax: 10, workSets: 3, targetRIR: 2, restSec: 180 },
      { exerciseId: 'bb-row',         repRangeMin: 8,  repRangeMax: 12, workSets: 3, targetRIR: 2, restSec: 150 },
      { exerciseId: 'ohp',            repRangeMin: 8,  repRangeMax: 12, workSets: 3, targetRIR: 2, restSec: 150 },
      { exerciseId: 'bb-curl',        repRangeMin: 10, repRangeMax: 15, workSets: 3, targetRIR: 2, restSec: 90  },
    ],
  }];
}

function seedProgramIfEmpty(state) {
  if (state.program.days.length > 0) return state;
  return { ...state, program: { ...state.program, days: starterProgram() } };
}

/* ---------- DOM ---------- */

function initProgram(root, opts = {}) {
  const St = opts.store || {
    load, save, searchExercises, getExercise,
    addDay, updateDay, deleteDay, addDayItem, updateDayItem, removeDayItem, moveDayItem,

  };
  const lib = () => (opts.library || (typeof EXERCISE_LIBRARY !== 'undefined' ? EXERCISE_LIBRARY : []));
  const muscleLabels = opts.muscleLabels || (typeof MUSCLE_LABELS !== 'undefined' ? MUSCLE_LABELS : {});

        <div class="chips">
          ${opt('wiz-goal', 'hypertrophy', wiz.goal, 'Рост мышц')}

        </div>

        <div class="wiz-step"><b>3.</b> Сколько тренировок в неделю?</div>
        <div class="chips">${[2, 3, 4, 5].map((n) =>
          `<button class="chip${wiz.count === n ? ' on' : ''}" data-act="wiz-count" data-n="${n}">${n}</button>`).join('')}</div>

        <div class="wiz-step"><b>4.</b> В какие дни? <small>(выбрано ${picked}/${wiz.count})</small></div>
        <div class="chips">${wd.map((label, i) =>

        <div class="wiz-step"><b>5.</b> Время на тренировку</div>

        </div>

        <div class="wiz-step"><b>6.</b> Формат</div>
        <div class="chips">
          ${opt('wiz-split', 'auto', wiz.split, 'Авто')}
          ${opt('wiz-split', 'full', wiz.split, 'Фулбади')}
          ${opt('wiz-split', 'split', wiz.split, 'По группам')}
        </div>

        <div class="meso-actions">

          <button class="btn ghost" data-act="wiz-create" ${picked === wiz.count ? '' : 'disabled'}>Создать пустую</button>

        <div class="meso-hint">Подбор — по принципам доказательного тренинга (Schoenfeld, Israetel/RP, Helms):
        10–20 сетов на группу в неделю, каждая группа ≥2×/нед, работа близко к отказу (RIR ведёт мезоцикл),
        приоритет упражнениям с растянутой позицией. Всё можно править после создания.</div>
      </section>`;
  }

  function dayCard(d) {
    const items = d.items.map((it, i) => {
      const ex = St.getExercise(state, it.exerciseId) || { name: it.exerciseId };
      return `
        <div class="prog-item" data-day="${d.id}" data-idx="${i}">
          <div class="pi-top">

            <div class="pi-ord">
              <button class="mini" data-act="up"   data-day="${d.id}" data-idx="${i}">↑</button>
              <button class="mini" data-act="down" data-day="${d.id}" data-idx="${i}">↓</button>

          </div>
          <div class="pi-params">
            ${miniStep(d.id, i, 'repRangeMin', it.repRangeMin, 'повт min')}
            ${miniStep(d.id, i, 'repRangeMax', it.repRangeMax, 'повт max')}
            ${miniStep(d.id, i, 'workSets', it.workSets, 'сеты')}
            ${miniStep(d.id, i, 'targetRIR', it.targetRIR, 'RIR')}
            ${miniStep(d.id, i, 'restSec', it.restSec, 'отдых, с')}
          </div>
        </div>`;
    }).join('') || '<div class="pi-empty">Пусто — добавьте упражнение.</div>';

    const wd = (typeof WEEKDAYS !== 'undefined') ? WEEKDAYS : ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    const wdChips = wd.map((label, i) =>
      `<button class="chip wd${d.weekday === i ? ' on' : ''}" data-act="set-wd" data-day="${d.id}" data-wd="${i}">${label}</button>`).join('');

    return `
      <section class="day-card">
        <div class="day-head">
          <div class="day-label">День ${d.label}${d.weekday != null ? ' · ' + wd[d.weekday] : ''}</div>
          <div>
            <button class="btn sm" data-act="add-item" data-day="${d.id}">+ упражнение</button>
            <button class="mini" data-act="del-day" data-day="${d.id}">🗑</button>
          </div>
        </div>
        <div class="chips wd-row">${wdChips}</div>
        ${items}
      </section>`;
  }

  function miniStep(dayId, idx, field, value, label) {
    return `
      <div class="mstep" data-field="${field}">
        <button class="ms-btn" data-act="p-" data-day="${dayId}" data-idx="${idx}" data-field="${field}">−</button>
        <label class="ms-val"><input class="ms-in" type="number" inputmode="numeric" data-day="${dayId}" data-idx="${idx}" data-field="${field}" value="${value}"><small>${label}</small></label>
        <button class="ms-btn" data-act="p+" data-day="${dayId}" data-idx="${idx}" data-field="${field}">+</button>
      </div>`;
  }

  function pickerHtml() {
    const results = St.searchExercises(state, { query, muscle });
    const chips = ['chest', 'back', 'legs', 'shoulders', 'arms', 'core']
      .map((m) => `<button class="chip${muscle === m ? ' on' : ''}" data-act="filter" data-m="${m}">${muscleLabels[m] || m}</button>`).join('');
    const list = results.map((e) =>
      `<button class="lib-row" data-act="pick" data-id="${e.id}">
         <span>${e.name}${e.isCustom ? ' <span class="badge cal">своё</span>' : ''}</span>
         <small>${muscleLabels[e.primaryMuscle] || e.primaryMuscle} · ${e.kind === 'compound' ? 'база' : 'изоляция'}</small>
       </button>`).join('') || '<div class="pi-empty">Ничего не найдено.</div>';

    const custom = customOpen ? `
      <div class="custom-form">
        <input class="in" id="cx-name" placeholder="Название своего упражнения">
        <div class="cx-err" id="cx-err"></div>
        <div class="chips">${['chest','back','legs','shoulders','arms','core'].map((m)=>`<button class="chip${m==='chest'?' on':''}" data-act="cx-m" data-m="${m}">${muscleLabels[m]||m}</button>`).join('')}</div>
        <div class="row">
          <button class="chip" data-act="cx-kind" data-kind="compound">база</button>
          <button class="chip on" data-act="cx-kind" data-kind="isolation">изоляция</button>
          <input class="in short" id="cx-step" type="number" step="0.5" value="2.5" placeholder="шаг, кг">
        </div>
        <button class="btn" data-act="cx-create">Создать и добавить</button>
      </div>` : `<button class="btn ghost" data-act="cx-open">+ своё упражнение</button>`;

    return `
      <div class="overlay" data-act="close-bg">
        <div class="sheet">
          <div class="sheet-head">
            <b>Выбрать упражнение</b>
            <button class="mini" data-act="close">✕</button>
          </div>
          <input class="in" id="lib-search" placeholder="Поиск…" value="${query}">
          <div class="chips">${chips}</div>
          <div class="lib-list">${list}</div>
          ${custom}
        </div>
      </div>`;
  }

  /* --- события --- */
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const dayId = btn.dataset.day, idx = btn.dataset.idx != null ? +btn.dataset.idx : null;

    switch (act) {
      case 'wiz-sex': wiz.sex = btn.dataset.v; render(); break;
      case 'wiz-goal': wiz.goal = btn.dataset.v; render(); break;
      case 'wiz-time': wiz.time = +btn.dataset.v; render(); break;
      case 'wiz-split': wiz.split = btn.dataset.v; render(); break;
      case 'wiz-count': wiz.count = +btn.dataset.n; wiz.days = wiz.days.slice(0, wiz.count); render(); break;
      case 'wiz-wd': {
        const w = +btn.dataset.wd;
        if (wiz.days.includes(w)) wiz.days = wiz.days.filter((x) => x !== w);
        else if (wiz.days.length < wiz.count) wiz.days = [...wiz.days, w];
        render(); break;
      }
      case 'wiz-create': {
        if (wiz.days.length !== wiz.count) break;
        let next = state;
        for (const w of [...wiz.days].sort((a, b) => a - b)) {
          const r = St.addDay(next, { weekday: w });

          const r = St.addDay(next, { label: gd.label, weekday: wds[i] });

          for (const it of gd.items) next = St.addDayItem(next, r.day.id, it);

        if (!confirmDel('Пересоздать программу? Текущие дни будут удалены (история тренировок сохранится).')) break;

        persist(next); break;
