        const cur = state.program.days.find((d) => d.id === dayId);
        const w = +btn.dataset.wd;
        persist(St.updateDay(state, dayId, { weekday: cur && cur.weekday === w ? null : w }));
        break;
      }
      case 'add-day': { const r = St.addDay(state); persist(r.state); break; }
      case 'del-day': { if (confirmDel('Удалить день?')) persist(St.deleteDay(state, dayId)); break; }
      case 'rm-item': persist(St.removeDayItem(state, dayId, idx)); break;
      case 'up': persist(St.moveDayItem(state, dayId, idx, -1)); break;
      case 'down': persist(St.moveDayItem(state, dayId, idx, +1)); break;
      case 'p-': case 'p+': stepParam(dayId, idx, btn.dataset.field, act === 'p+' ? +1 : -1); break;
      case 'add-item': picker = { dayId }; query = ''; muscle = null; customOpen = false; render(); break;
      case 'close': case 'close-bg': if (act === 'close' || e.target.classList.contains('overlay')) { picker = null; customOpen = false; render(); } break;
      case 'filter': muscle = (muscle === btn.dataset.m ? null : btn.dataset.m); render(); break;
      case 'pick': pickExercise(btn.dataset.id); break;
      case 'cx-open': customOpen = true; render(); break;
      // выбор мышцы/типа — только классы, без render (иначе стирается ввод названия)
      case 'cx-m': root.querySelectorAll('.custom-form [data-act="cx-m"]').forEach((x) => x.classList.remove('on')); btn.classList.add('on'); break;
      case 'cx-kind': root.querySelectorAll('[data-act="cx-kind"]').forEach((x) => x.classList.remove('on')); btn.classList.add('on'); break;
      case 'cx-create': createCustom(); break;
    }
  });

  // поиск: обновляем только список, чтобы не терять фокус ввода
  root.addEventListener('input', (e) => {
    if (e.target.id === 'lib-search') {
      query = e.target.value;
      const listEl = root.querySelector('.lib-list');
      if (listEl) {
        const results = St.searchExercises(state, { query, muscle });
        listEl.innerHTML = results.map((ex) =>
          `<button class="lib-row" data-act="pick" data-id="${ex.id}">
             <span>${ex.name}${ex.isCustom ? ' <span class="badge cal">своё</span>' : ''}</span>
             <small>${muscleLabels[ex.primaryMuscle] || ex.primaryMuscle} · ${ex.kind === 'compound' ? 'база' : 'изоляция'}</small>
           </button>`).join('') || '<div class="pi-empty">Ничего не найдено.</div>';
      }
    }
  });

  // ручной ввод параметров дня: коммитим по завершении ввода (без render — не ломаем каретку/клики)
  root.addEventListener('change', (e) => {
    const inp = e.target.closest('.ms-in');
    if (!inp) return;
    const dayId = inp.dataset.day, idx = +inp.dataset.idx, field = inp.dataset.field;
    const day = state.program.days.find((d) => d.id === dayId);
    const it = day && day.items[idx];
    if (!it) return;
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = it[field];
    const min = field === 'restSec' ? 0 : field === 'targetRIR' ? 0 : 1;
    v = Math.max(min, Math.round(v));
    if (field === 'targetRIR') v = Math.min(5, v);
    if (field === 'repRangeMin') v = Math.min(v, it.repRangeMax);
    if (field === 'repRangeMax') v = Math.max(v, it.repRangeMin);
    state = St.updateDayItem(state, dayId, idx, { [field]: v });
    St.save(state); onCommit(state);
    inp.value = v;
  });

  function stepParam(dayId, idx, field, dir) {
    const day = state.program.days.find((d) => d.id === dayId);
    const it = day.items[idx];
    const step = field === 'restSec' ? 15 : 1;
    const min = field === 'targetRIR' ? 0 : 1;
    let v = it[field] + dir * step;
    if (v < min) v = min;
    if (field === 'targetRIR' && v > 5) v = 5;
    if (field === 'repRangeMin' && v > it.repRangeMax) v = it.repRangeMax;
    if (field === 'repRangeMax' && v < it.repRangeMin) v = it.repRangeMin;
    persist(St.updateDayItem(state, dayId, idx, { [field]: v }));
  }

  function pickExercise(exId) {
    const ex = St.getExercise(state, exId);
    if (!ex || !picker) return;
    persist(St.addDayItem(state, picker.dayId, defaultItemFor(ex)));
    picker = null;
  }

  function createCustom() {
    const name = (root.querySelector('#cx-name') || {}).value || '';
    const step = (root.querySelector('#cx-step') || {}).value;
    const kindBtn = root.querySelector('.custom-form [data-act="cx-kind"].on');
    const kind = kindBtn ? kindBtn.dataset.kind : 'isolation';
    const mBtn = root.querySelector('.custom-form [data-act="cx-m"].on');
    const primaryMuscle = mBtn ? mBtn.dataset.m : 'chest';
    try {
      const r = St.addCustomExercise(state, { name, primaryMuscle, kind, weightStep: step });
      let next = r.state;
      if (picker) next = St.addDayItem(next, picker.dayId, defaultItemFor(r.exercise));
      picker = null; customOpen = false;
      persist(next);
    } catch (err) {
      const errEl = root.querySelector('#cx-err');   // без alert() — неблокирующая подсказка
      if (errEl) errEl.textContent = err.message;
    }
  }

  function confirmDel(msg) { return typeof confirm === 'undefined' ? true : confirm(msg); }

  render();
  return { render, getState: () => state };
}

/* export для node-тестов; в браузере — глобальные объявления */
if (typeof module !== 'undefined') {
  module.exports = { defaultItemFor, itemSummary, starterProgram, seedProgramIfEmpty, initProgram };
}

  <script>
/* ============================================================
 * ui-analytics.js — экран аналитики: e1RM (canvas), объём по группам
 * (canvas), бейджи стагнации, лента истории с редактированием.
 * Чистые модели графиков экспортируются для тестов; отрисовка на
 * <canvas> и правки истории — DOM/браузер.
 * Зависимости в браузере — глобали analytics.js / store.js / exercises.js.
 * ============================================================ */

/* ---------- чистые модели графиков (тестируемые) ---------- */

/** Модель линейного графика e1RM → координаты точек в пикселях. */
function lineChartModel(points, { w = 320, h = 160, pad = 28 } = {}) {
  const n = points.length;
  if (n === 0) return { pts: [], empty: true, min: 0, max: 0, n: 0 };
  const vals = points.map((p) => p.e1rm);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min -= 1; max += 1; }                 // избегаем деления на 0
  const plotW = w - 2 * pad, plotH = h - 2 * pad;
  const pts = points.map((p, i) => ({
    x: pad + (n === 1 ? plotW / 2 : (plotW * i) / (n - 1)),
    y: pad + plotH * (1 - (p.e1rm - min) / (max - min)),
    e1rm: p.e1rm,
    isCalibration: !!p.isCalibration,
  }));
  return { pts, empty: false, min, max, n };
}

/** Модель столбчатого графика объёма + линии коридора. */
function barChartModel(bars, { w = 320, h = 160, pad = 28, corridor = [10, 20] } = {}) {
  const [lo, hi] = corridor;
  const maxScale = Math.max(hi + 2, ...bars.map((b) => b.count));
  const plotW = w - 2 * pad, plotH = h - 2 * pad;
  const slot = plotW / Math.max(1, bars.length);
  const bw = slot * 0.62;
  const yOf = (v) => pad + plotH * (1 - v / maxScale);
  const rects = bars.map((b, i) => {
    const y = yOf(b.count);
    return {
      x: pad + i * slot + (slot - bw) / 2,
      y,
      w: bw,
      h: pad + plotH - y,
      muscle: b.muscle,
      count: b.count,
      status: b.status,
    };
  });
  return { rects, loY: yOf(lo), hiY: yOf(hi), maxScale, baseY: pad + plotH };
}

/* ---------- палитра (canvas не читает CSS-переменные) ---------- */
const APAL = {
  line: '#4c8dff', cal: '#b07cff', grid: '#2b313b', axis: '#3a4759',
  text: '#94a0b0', ok: '#4c8dff', low: '#f0a336', high: '#ff5d5d', barBg: '#3a4759',
};

/* ---------- DOM ---------- */

function initAnalytics(root, opts = {}) {
  const St = opts.store || { load, save, updateSet, deleteSet, getExercise };
  const An = opts.analytics || { e1rmSeries, weeklyVolume, stagnation, MUSCLE_ORDER, VOLUME_CORRIDOR };
  const lib = opts.library || (typeof EXERCISE_LIBRARY !== 'undefined' ? EXERCISE_LIBRARY : []);
  const muscleLabels = opts.muscleLabels || (typeof MUSCLE_LABELS !== 'undefined' ? MUSCLE_LABELS : {});

  const onCommit = opts.onCommit || function () {};
  let state = opts.state || St.load(lib);
  let selEx = null;
  let editing = null;               // setId в режиме правки
  let draft = null;                 // { weight, reps, rir }

  function persist(next) { state = next; St.save(state); onCommit(state); render(); }

  function loggedExercises() {
    const ids = new Set();
    for (const s of state.sessions) for (const st of s.sets) ids.add(st.exerciseId);
    return state.exercises.filter((e) => ids.has(e.id));
  }

  function render() {
    const exs = loggedExercises();
    if (!selEx || !exs.some((e) => e.id === selEx)) selEx = exs.length ? exs[0].id : null;

    const stg = An.stagnation(state);
    root.innerHTML = `
      <div class="an-screen">
        <div class="wk-title">Аналитика</div>

        <section class="an-card">
          <div class="an-head">
            <b>Динамика e1RM</b>
            <select class="sel" id="an-ex">
              ${exs.map((e) => `<option value="${e.id}"${e.id === selEx ? ' selected' : ''}>${e.name}</option>`).join('') || '<option>нет данных</option>'}
            </select>
          </div>
          <canvas id="an-e1rm" class="chart"></canvas>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Объём за неделю</b><small>сеты · коридор ${An.VOLUME_CORRIDOR[0]}–${An.VOLUME_CORRIDOR[1]}</small></div>
          <canvas id="an-vol" class="chart"></canvas>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Стагнация</b></div>
          ${stg.length
            ? stg.map((s) => `<div class="stag"><div class="stag-name">${s.name}</div><div class="stag-hint">${s.hint}</div></div>`).join('')
            : '<div class="pi-empty">Нет застоя — e1RM растёт по всем упражнениям с историей.</div>'}
        </section>

        <section class="an-card">
          <div class="an-head"><b>История</b></div>
          ${historyHtml()}
        </section>
      </div>`;

    drawCharts();
  }

  function historyHtml() {
    const sessions = [...state.sessions]
      .filter((s) => s.sets.length)
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 12);
    if (!sessions.length) return '<div class="pi-empty">Пока нет залогированных тренировок.</div>';
    return sessions.map((s) => {
      const rows = s.sets.map((st) => setRow(st)).join('');
      return `<div class="hist-ses">
        <div class="hist-date">${s.date.slice(0, 10)}${s.isDeload ? ' · делоуд' : ''} · нед ${s.weekNo}</div>
        ${rows}
      </div>`;
    }).join('');
  }

  function setRow(st) {
    const ex = St.getExercise(state, st.exerciseId) || { name: st.exerciseId, weightStep: 2.5 };
    if (editing === st.id) {
      return `<div class="hist-edit" data-set="${st.id}">
        <div class="pi-name">${ex.name}</div>
        <div class="pi-params">
          ${eStep('weight', draft.weight, 'кг')}
          ${eStep('reps', draft.reps, 'повт')}
          ${eStep('rir', draft.rir, 'RIR')}
        </div>
        <div class="hist-actions">
          <button class="btn sm" data-act="save-set" data-set="${st.id}">Сохранить</button>
          <button class="btn sm ghost" data-act="cancel-set">Отмена</button>
          <button class="mini" data-act="del-set" data-set="${st.id}">🗑</button>
        </div>
      </div>`;
    }
    return `<div class="hist-row">
      <span class="hist-ex">${ex.name}${st.isCalibration ? ' <span class="badge cal">кал.</span>' : ''}</span>
      <span class="hist-val">${st.weight} × ${st.reps}${st.rir != null ? ' · RIR ' + st.rir : ''}</span>
      <button class="mini" data-act="edit-set" data-set="${st.id}">✎</button>
    </div>`;
  }

  function eStep(field, value, label) {
    return `<div class="mstep" data-field="${field}">
      <button class="ms-btn" data-act="e-" data-field="${field}">−</button>
      <label class="ms-val"><input class="ms-in" type="number" inputmode="decimal" data-field="${field}" value="${value}"><small>${label}</small></label>
      <button class="ms-btn" data-act="e+" data-field="${field}">+</button>
    </div>`;
  }

  /* --- отрисовка canvas --- */
  function drawCharts() {
    if (selEx) drawLine(root.querySelector('#an-e1rm'), An.e1rmSeries(state, selEx));
    drawBars(root.querySelector('#an-vol'), An.weeklyVolume(state).byMuscle);
  }

  function fitCanvas(cv) {
    if (!cv) return null;
    const cssW = cv.clientWidth || 320, cssH = 160;
    const dpr = (typeof window !== 'undefined' && window.devicePixelRatio) || 1;
    cv.width = cssW * dpr; cv.height = cssH * dpr;
    cv.style.height = cssH + 'px';
    const ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    return { ctx, w: cssW, h: cssH };
  }

  function drawLine(cv, series) {
    const c = fitCanvas(cv); if (!c) return;
    const { ctx, w, h } = c;
    const m = lineChartModel(series, { w, h });
    ctx.clearRect(0, 0, w, h);
    if (m.empty) { emptyText(ctx, w, h, 'Нет данных'); return; }
    // ось min/max
    ctx.fillStyle = APAL.text; ctx.font = '11px sans-serif';
    ctx.fillText(m.max.toFixed(0), 4, 16);
    ctx.fillText(m.min.toFixed(0), 4, h - 8);
    // линия
    ctx.strokeStyle = APAL.line; ctx.lineWidth = 2; ctx.beginPath();
    m.pts.forEach((p, i) => { i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y); });
    ctx.stroke();
    // точки
    m.pts.forEach((p) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = p.isCalibration ? APAL.cal : APAL.line; ctx.fill();
    });
  }

  function drawBars(cv, bars) {
    const c = fitCanvas(cv); if (!c) return;
    const { ctx, w, h } = c;
    const m = barChartModel(bars, { w, h, corridor: An.VOLUME_CORRIDOR });
    ctx.clearRect(0, 0, w, h);
    // коридор
    ctx.strokeStyle = APAL.axis; ctx.setLineDash([4, 4]); ctx.lineWidth = 1;
    [m.loY, m.hiY].forEach((y) => { ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(w - 6, y); ctx.stroke(); });
    ctx.setLineDash([]);
    // столбцы
    m.rects.forEach((r) => {
      ctx.fillStyle = r.status === 'high' ? APAL.high : r.status === 'low' ? APAL.low : APAL.ok;
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = APAL.text; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(muscleLabels[r.muscle] || r.muscle, r.x + r.w / 2, m.baseY + 12);
      if (r.count) ctx.fillText(String(r.count), r.x + r.w / 2, r.y - 3);
      ctx.textAlign = 'left';
    });
  }

  function emptyText(ctx, w, h, txt) {
    ctx.fillStyle = APAL.text; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(txt, w / 2, h / 2); ctx.textAlign = 'left';
  }

  /* --- события --- */
  // ручной ввод при правке сета — обновляем draft без render (не теряем каретку)
  root.addEventListener('input', (e) => {
    const inp = e.target.closest('.ms-in');
    if (!inp || !draft) return;
    const v = parseFloat(inp.value);
    if (!isNaN(v)) draft[inp.dataset.field] = v;
  });
  root.addEventListener('change', (e) => {
    if (e.target.id === 'an-ex') { selEx = e.target.value; drawCharts(); return; }
    const inp = e.target.closest('.ms-in');
    if (!inp || !draft) return;
    const f = inp.dataset.field;
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = draft[f];
    if (f === 'weight') v = Math.max(0, v);
    else if (f === 'reps') v = Math.max(1, Math.round(v));
    else if (f === 'rir') v = Math.min(5, Math.max(0, Math.round(v)));
    draft[f] = v; inp.value = v;
  });
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]'); if (!btn) return;
    const act = btn.dataset.act, setId = btn.dataset.set;
    const st = setId ? findSet(setId) : null;

    if (act === 'edit-set' && st) { editing = setId; draft = { weight: st.weight, reps: st.reps, rir: st.rir == null ? 0 : st.rir }; render(); }
    else if (act === 'cancel-set') { editing = null; draft = null; render(); }
    else if (act === 'e-' || act === 'e+') { stepDraft(btn.dataset.field, act === 'e+' ? 1 : -1, st); render(); }
    else if (act === 'save-set' && st) { persist(St.updateSet(state, setId, { weight: draft.weight, reps: draft.reps, rir: draft.rir })); editing = null; draft = null; }
    else if (act === 'del-set') { persist(St.deleteSet(state, setId)); editing = null; draft = null; }
  });

  function findSet(setId) {
    for (const s of state.sessions) { const f = s.sets.find((x) => x.id === setId); if (f) return f; }
    return null;
  }
  function stepDraft(field, dir, st) {
    if (!draft) return;
    const ex = st ? (St.getExercise(state, st.exerciseId) || { weightStep: 2.5 }) : { weightStep: 2.5 };
    if (field === 'weight') draft.weight = Math.max(0, +(draft.weight + dir * (ex.weightStep || 2.5)).toFixed(3));
    else if (field === 'reps') draft.reps = Math.max(1, draft.reps + dir);
    else if (field === 'rir') draft.rir = Math.min(5, Math.max(0, draft.rir + dir));
  }

  render();
  return { render, getState: () => state };
}

if (typeof module !== 'undefined') {
  module.exports = { lineChartModel, barChartModel, initAnalytics };
}

</script>
  <script>
/* ============================================================
 * app.js — контроллер приложения: общий state, роутер экранов,
 * экран настроек (мезоцикл + бэкап), напоминание о бэкапе.
 * Единственный владелец state в браузере: экраны получают его и
 * возвращают изменения через onCommit — store.save() остаётся
 * единственной точкой записи.
 * ============================================================ */

function initApp() {
  // общий state (владелец — app.js); пустая программа не засевается —
  // вместо этого экран «Программа» показывает мастер создания
  let state = load(EXERCISE_LIBRARY);

  // экраны сообщают об изменениях сюда — держим один объект state
  const onCommit = (next) => { state = next; };

  const SCREENS = {
    workout: (root) => initWorkout(root, { state, onCommit }),
    program: (root) => initProgram(root, { state, onCommit }),
    analytics: (root) => initAnalytics(root, { state, onCommit }),
    settings: (root) => renderSettings(root),
  };

  function show(name) {
    document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.querySelectorAll('#nav button').forEach((b) => b.classList.toggle('active', b.dataset.screen === name));
    // монтируем экран заново из актуального общего state
    SCREENS[name](document.getElementById(name + '-root'));
  }

  document.getElementById('nav').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-screen]');
    if (b) show(b.dataset.screen);
  });

  /* ---------- экран настроек: мезоцикл + бэкап ---------- */

  function renderSettings(root) {
    const m = mesoStatus(state);
    const overdue = backupOverdue(state);
    const last = state.settings.lastBackupAt ? state.settings.lastBackupAt.slice(0, 10) : 'никогда';

    root.innerHTML = `
      <div class="an-screen">
        <div class="wk-title">Настройки</div>

        <section class="an-card">
          <div class="an-head"><b>Мезоцикл</b></div>
          <div class="meso-row">
            <div class="meso-badge">Цикл ${m.cycleNo}</div>
            <div class="meso-badge">Неделя ${m.weekNo}${m.isDeload ? ' · делоуд' : ''}</div>
            <div class="meso-badge">Цель RIR ${m.targetRIR}</div>
          </div>
          <div class="meso-actions">
            <button class="btn" data-act="adv-week">Завершить неделю →</button>
            <button class="btn ghost sm" data-act="deload-earlier">Делоуд раньше</button>
            <button class="btn ghost sm" data-act="deload-later">Делоуд позже</button>
          </div>
          <div class="meso-hint">Делоуд на неделе ${m.deloadWeek}${m.deloadShift ? ` (сдвиг ${m.deloadShift > 0 ? '+' : ''}${m.deloadShift})` : ''}. Сдвиг ±1 — риск из PRD.</div>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Бэкап данных</b></div>
          ${overdue ? '<div class="cx-err" style="color:var(--warn)">Пора сделать бэкап — данные хранятся только в этом браузере.</div>' : ''}
          <div class="meso-hint">Последний бэкап: ${last}. Сессий: ${state.sessions.length}.</div>
          <div class="meso-actions">
            <button class="btn" data-act="export">Скачать JSON</button>
            <label class="btn ghost" style="cursor:pointer">Импорт JSON
              <input type="file" id="import-file" accept="application/json,.json" style="display:none">
            </label>
          </div>
          <div class="cx-err" id="backup-msg"></div>
        </section>
      </div>`;

    root.onclick = (e) => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      const act = btn.dataset.act;
      if (act === 'adv-week') { state = advanceWeek(state); save(state); renderSettings(root); }
      else if (act === 'deload-earlier') { state = shiftDeload(state, -1); save(state); renderSettings(root); }
      else if (act === 'deload-later') { state = shiftDeload(state, +1); save(state); renderSettings(root); }
      else if (act === 'export') { doExport(root); }
    };

    const fileInput = root.querySelector('#import-file');
    if (fileInput) fileInput.addEventListener('change', (e) => doImport(e, root));
  }

  function doExport(root) {
    const b = exportBackup(state);
    state = b.state; save(state);                        // фиксируем дату бэкапа
    const url = URL.createObjectURL(new Blob([b.json], { type: 'application/json' }));
    const a = document.createElement('a');
    a.href = url; a.download = b.filename; document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    renderSettings(root);
  }

  function doImport(e, root) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        state = importBackup(String(reader.result));
        save(state);
        renderSettings(root);
      } catch (err) {
        const msg = root.querySelector('#backup-msg');
        if (msg) msg.textContent = 'Не удалось импортировать: ' + err.message;
      }
    };
    reader.readAsText(file);
  }

  // старт: экран тренировки; мягкое напоминание о бэкапе
  show('workout');
  if (backupOverdue(state)) {
    const b = document.querySelector('#nav button[data-screen="settings"]');
    if (b) b.classList.add('nudge');
  }
}

if (typeof module !== 'undefined') {
  module.exports = { initApp };
} else if (typeof document !== 'undefined') {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp);
  else initApp();
}

</script>
