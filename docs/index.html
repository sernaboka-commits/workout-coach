    if (work.length === 0) {
      const target = Math.round((item.repRangeMin + item.repRangeMax) / 2);
      const cal = engine.calibrate(probe, {
        targetReps: target,
        targetRIR: ctx.meso.targetRIR,
        weightStep: ctx.exercise.weightStep,
      });
      return {
        mode: 'control',
        calibration: cal,
        rec: { weight: cal.weight, reps: target, targetRIR: ctx.meso.targetRIR, reason: cal.reason },
      };
    }
    // контрольный сделан — держим вес, повторы под целевой RIR
    const prev = work[work.length - 1];
    return { mode: 'work', rec: nextSetRec(prev, ctx, item, engine) };
  }

  // обычная рекомендация
  const rec = engine.recommend(item.exerciseId, work.length + 1, ctx);
  if (work.length > 0) {
    // следующий сет этой сессии: тот же вес, повторы пересчитаны от факта прошлого сета
    return { mode: 'work', rec: nextSetRec(work[work.length - 1], ctx, item, engine) };
  }
  return { mode: 'work', rec };
}

/** Рекомендация на следующий сет ЭТОЙ сессии от фактического прошлого сета (RIR-aware). */
function nextSetRec(prev, ctx, item, engine) {
  const t = ctx.meso.targetRIR;
  const reps = engine.projectReps(prev, t, item);
  const rir = prev.rir == null ? t : prev.rir;
  const rtf = Number(prev.reps) + rir;
  const did = prev.weight > 0 ? `${prev.reps}×${prev.weight}` : `${prev.reps} повт`;
  return {
    weight: prev.weight,
    reps,
    targetRIR: t,
    needsCalibration: false,
    bodyweight: !(prev.weight > 0) && !!(ctx.exercise && ctx.exercise.bodyweight),
    reason: `Прошлый подход ${did}${prev.rir != null ? ' RIR ' + prev.rir : ''} → до отказа ~${rtf}. Цель RIR ${t}: ${reps} повт.`,
  };
}

/* ---------- DOM: монтирование экрана (браузер) ---------- */

function initWorkout(root, opts = {}) {
  const S = opts.store || {
    startSession, logSet, save, getExercise, exerciseHistory,
  };
  const E = opts.engine || { recommend, calibrate, mesoStatus, context, projectReps, nextSessionAdvice };
  const onCommit = opts.onCommit || function () {};

  let state = opts.state;
  const allDays = (state.program.days && state.program.days.length) ? state.program.days : null;
  const meso = E.mesoStatus(state);

  // программы нет → подсказка вместо экрана
  if (!allDays && !opts.day) {
    root.innerHTML = `<div class="placeholder">Программы пока нет.<br>Создай её во вкладке <b>«Программа»</b>: количество тренировок → дни недели → упражнения.</div>`;
    return { render: () => {}, stopRest: () => {} };
  }

  // день по умолчанию: назначенный на сегодня день недели, иначе первый
  let day = opts.day || pickDayForDate(allDays, todayIdx()) || allDays[0];

  let session = null;      // ленивая: создаётся при первом залоге
  const drafts = {};       // exId -> { weight, reps, rir, mode }
  let timer = null;        // { endTs, restSec, handle }
  let showSummary = false; // оверлей итога тренировки

  // возобновляем сегодняшнюю сессию этого дня, если она уже начата
  function resumeSession() {
    const today = new Date().toISOString().slice(0, 10);
    session = state.sessions.find((s) => s.dayId === day.id && String(s.date).slice(0, 10) === today) || null;
  }
  resumeSession();

  function setDay(dayId) {
    const d = (allDays || []).find((x) => x.id === dayId);
    if (!d || d === day) return;
    day = d;
    stopRest(false); timer = null;
    for (const k of Object.keys(drafts)) delete drafts[k];
    resumeSession();
    render();
  }

  function ensureSession() {
    if (!session) {
      const r = S.startSession(state, day.id, { isDeload: meso.isDeload });
      state = r.state;
      session = r.session;
    }
    return session;
  }
  function liveSession() {
    if (!session) return { sets: [] };
    return state.sessions.find((s) => s.id === session.id);
  }
  function exSets(exId) {
    return liveSession().sets.filter((s) => s.exerciseId === exId);
  }
  function ctxFor(item) {
    return E.context(state, item.exerciseId, item, S.exerciseHistory);
  }
  function planFor(item) {
    return planExercise(item, exSets(item.exerciseId), ctxFor(item), E);
  }
  function ensureDraft(item, plan) {
    const id = item.exerciseId;
    if (!drafts[id] || drafts[id].mode !== plan.mode) {
      drafts[id] = {
        mode: plan.mode,
        weight: plan.rec && plan.rec.weight != null ? plan.rec.weight
          : (exSets(id).slice(-1)[0]?.weight ?? item._lastW ?? 20),
        reps: plan.rec ? plan.rec.reps : item.repRangeMin,
        rir: plan.rec ? plan.rec.targetRIR : 2,
      };
    }
    return drafts[id];
  }

  /* --- рендер --- */
  function render() {
    const prog = dayProgress(day, liveSession().sets);
    const parts = [];

    // переключатель дней (если их больше одного); сегодняшний помечается
    if (allDays && allDays.length > 1) {
      const tIdx = todayIdx();
      parts.push(`<div class="day-tabs">${allDays.map((d) => `
        <button class="day-tab${d.id === day.id ? ' on' : ''}" data-act="switch-day" data-day="${d.id}">
          ${d.label}${d.weekday != null ? ' · ' + WEEKDAYS[d.weekday] : ''}${d.weekday === tIdx ? ' ●' : ''}
        </button>`).join('')}</div>`);
    }

    const wd = day.weekday != null ? ' · ' + WEEKDAYS[day.weekday] : '';
    parts.push(`
      <header class="wk-head">
        <div>
          <div class="wk-title">День ${day.label}${wd} · Неделя ${meso.weekNo}${meso.isDeload ? ' · ДЕЛОУД' : ''}</div>
          <div class="wk-sub">Цель недели: RIR ${meso.targetRIR}</div>
        </div>
        <div class="wk-prog">${prog.done}/${prog.total}</div>
      </header>`);

    for (const item of day.items) {
      const ex = S.getExercise(state, item.exerciseId) || { name: item.exerciseId, weightStep: 2.5 };
      const plan = planFor(item);
      const logged = exSets(item.exerciseId);
      const badge = plan.mode === 'probe' ? '<span class="badge cal">калибровка</span>'
        : plan.mode === 'control' ? '<span class="badge cal">контроль</span>'
        : plan.mode === 'done' ? '<span class="badge ok">готово</span>' : '';

      const rows = logged.map((s, i) => `
        <div class="set-row done">
          <span class="set-no">${s.isCalibration ? 'кал.' : '#' + (i + 1)}</span>
          <span class="set-res">${s.weight > 0 ? s.weight + ' кг × ' + s.reps : s.reps + ' повт'}${s.rir != null ? ' · RIR ' + s.rir : ''}</span>
          <button class="mini" data-act="undo" data-set="${s.id}">✕</button>
        </div>`).join('');

      // прошлая сессия по этому упражнению (без калибровочных)
      const hist = S.exerciseHistory(state, item.exerciseId, { limit: 2 })
        .filter((h) => !h.sets.some((s) => logged.some((l) => l.id === s.id)))[0];
      const prevLine = hist
        ? `<div class="prev-line">Прошлый раз (${String(hist.date).slice(0, 10)}): ${setsText(hist.sets)}</div>`
        : '';

      let active = '';
      if (plan.mode !== 'done') {
        const d = ensureDraft(item, plan);
        const bw = !!ex.bodyweight;
        const recVals = plan.rec && plan.rec.reps != null
          ? (bw
            ? `<b>Рекомендация: ${plan.rec.reps} повт · RIR ${plan.rec.targetRIR}</b><br>`
            : (plan.rec.weight != null ? `<b>Рекомендация: ${plan.rec.weight} кг × ${plan.rec.reps} · RIR ${plan.rec.targetRIR}</b><br>` : ''))
          : '';
        const weightField = bw
          ? `<div class="bw-note">Собственный вес — прогрессия по повторам и RIR</div>`
          : entryField(item.exerciseId, 'weight', 'Вес, кг', d.weight, 'w', ex.weightStep || 2.5, 'decimal', 0, null);
        active = `
          <div class="rec-line">${recVals}${plan.rec ? plan.rec.reason : ''}</div>
          <div class="entry" data-ex="${item.exerciseId}">
            ${weightField}
            ${entryField(item.exerciseId, 'reps', 'Повторы', d.reps, 'r', 1, 'numeric', 1, null)}
            ${entryField(item.exerciseId, 'rir', 'RIR (в запасе)', d.rir, 'i', 1, 'numeric', 0, 5)}
            <button class="log-wide" data-act="log" data-ex="${item.exerciseId}">✓ Записать подход</button>
          </div>`;
      }

      parts.push(`
        <section class="ex-card${plan.mode === 'done' ? ' complete' : ''}">
          <div class="ex-head">
            <div class="ex-name">${ex.name} ${badge}</div>
            <div class="ex-meta">${item.repRangeMin}–${item.repRangeMax} повт · ${item.workSets} сетов · отдых ${fmtClock(item.restSec)}
              · <a class="vid-link" href="${videoUrl(ex)}" target="_blank" rel="noopener">🎬 видео</a></div>
          </div>
          ${prevLine}
          ${rows}
          ${active}
        </section>`);
    }

    if (liveSession().sets.length) {
      parts.push(`<button class="btn finish-btn" data-act="finish">🏁 Завершить тренировку</button>`);
    }

    root.innerHTML = `<div class="wk-screen">${parts.join('')}</div>${timerHtml()}${showSummary ? summaryHtml() : ''}`;
  }

  function summaryHtml() {
    const ses = liveSession();
    const sum = sessionSummary(ses, (id) => S.getExercise(state, id));
    const startMs = ses.date ? new Date(ses.date).getTime() : null;
    let dur = '—';
    if (startMs) {
      const min = Math.max(1, Math.round((Date.now() - startMs) / 60000));
      dur = min < 60 ? `${min} мин` : `${Math.floor(min / 60)} ч ${min % 60} мин`;
    }
    const growWeek = !meso.isDeload;
    const rows = sum.exercises.map((e) => {
      const item = day.items.find((i) => i.exerciseId === e.exerciseId);
      const ex = S.getExercise(state, e.exerciseId) || { weightStep: 2.5 };
      const exSetsList = ses.sets.filter((s) => s.exerciseId === e.exerciseId);
      const adv = item ? E.nextSessionAdvice(exSetsList, item, meso.targetRIR, { weightStep: ex.weightStep, growWeek, bodyweight: !!ex.bodyweight }) : null;
      const advHtml = adv
        ? `<div class="sum-advice lv-${adv.lever}"><b>След. раз:</b> ${adv.text}${adv.volume ? `<span class="sum-vol"> · ${adv.volume}</span>` : ''}</div>`
        : (e.calib ? '<div class="sum-advice lv-hold">След. раз: рабочие подходы → пойдут рекомендации</div>' : '');
      const top = e.top ? (e.top.weight > 0 ? ` · лучший ${e.top.weight}×${e.top.reps}` : ` · лучший ${e.top.reps} повт`) : '';
      return `<div class="sum-ex">
        <div class="sum-row"><span>${e.name}</span><small>${e.sets} подх${top}</small></div>
        ${advHtml}
      </div>`;
    }).join('');
    return `
      <div class="overlay">
        <div class="sheet">
          <div class="sheet-head"><b>Тренировка сохранена ✓</b><button class="mini" data-act="close-summary">✕</button></div>
          <div class="sum-stats">
            <div class="sum-stat"><b>${sum.workSets}</b><small>рабочих подходов</small></div>
            <div class="sum-stat"><b>${sum.tonnage}</b><small>тоннаж, кг</small></div>
            <div class="sum-stat"><b>${dur}</b><small>длительность</small></div>
          </div>
          <div class="sum-list">${rows || '<div class="pi-empty">Нет подходов.</div>'}</div>
          <div class="meso-hint">Рекомендация «След. раз» — один рычаг прогрессии на упражнение (вес / повторы / подходы) по твоим результатам. Данные уже сохранены.</div>
          <button class="log-wide" data-act="close-summary">Готово</button>
        </div>
      </div>`;
  }

  function timerHtml() {
    if (!timer) return '';
    const rem = computeRemaining(timer.endTs, Date.now());
    const pct = Math.round((1 - rem / timer.restSec) * 100);
    const over = rem <= 0;
    return `
      <div class="rest-bar${over ? ' over' : ''}">
        <div class="rest-fill" style="width:${Math.min(100, pct)}%"></div>
        <div class="rest-txt">${over ? 'Отдых окончен' : 'Отдых ' + fmtClock(rem)}</div>
        <button class="rest-add" data-act="rest+">+15с</button>
        <button class="rest-skip" data-act="rest-skip">${over ? 'Ок' : 'Пропустить'}</button>
      </div>`;
  }

  /* --- таймер отдыха --- */
  // перерисовываем только полоску таймера, а не весь экран —
  // иначе ручной ввод в поле стирается каждые 250мс
  function paintTimer() {
    const bar = root.querySelector('.rest-bar');
    if (!timer || !bar) { render(); return; }
    const rem = computeRemaining(timer.endTs, Date.now());
    const over = rem <= 0;
    const pct = Math.round((1 - rem / timer.restSec) * 100);
    bar.classList.toggle('over', over);
    const fill = bar.querySelector('.rest-fill'); if (fill) fill.style.width = Math.min(100, pct) + '%';
    const txt = bar.querySelector('.rest-txt'); if (txt) txt.textContent = over ? 'Отдых окончен' : 'Отдых ' + fmtClock(rem);
    const skip = bar.querySelector('.rest-skip'); if (skip) skip.textContent = over ? 'Ок' : 'Пропустить';
  }

  function startRest(restSec) {
    stopRest(false);
    timer = { endTs: Date.now() + restSec * 1000, restSec, handle: null, dinged: false };
    timer.handle = setInterval(() => {
      const rem = computeRemaining(timer.endTs, Date.now());
      if (rem <= 0 && !timer.dinged) { timer.dinged = true; beep(); buzz(); }
      if (rem <= 0) { clearInterval(timer.handle); timer.handle = null; }
      paintTimer();
    }, 250);
    render();
  }
  function stopRest(rerender = true) {
    if (timer && timer.handle) clearInterval(timer.handle);
    timer = null;
    if (rerender) render();
  }

  /* --- события --- */
  root.addEventListener('click', (e) => {
    // закрытие итога по тапу на фон (сам оверлей, не его содержимое)
    if (showSummary && e.target.classList.contains('overlay')) { showSummary = false; render(); return; }
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const exId = btn.dataset.ex;

    unlockAudio();   // любой тап на экране разблокирует звук таймера (iOS)

    if (act === 'finish') { showSummary = true; render(); return; }
    if (act === 'close-summary') { showSummary = false; render(); return; }
    if (act === 'switch-day') { setDay(btn.dataset.day); return; }
    if (act === 'rest+') { if (timer) { timer.endTs += 15000; timer.restSec += 15; if (!timer.handle) startRest(computeRemaining(timer.endTs, Date.now())); render(); } return; }
    if (act === 'rest-skip') { stopRest(); return; }
    if (act === 'undo') { removeSet(btn.dataset.set); return; }

    const item = day.items.find((i) => i.exerciseId === exId);
    if (!item) return;
    const ex = S.getExercise(state, exId) || { weightStep: 2.5 };
    const d = drafts[exId];
    if (!d) return;

    if (act === 'w-') d.weight = clampStep(d.weight, -1, ex.weightStep || 2.5, 0, null);
    else if (act === 'w+') d.weight = clampStep(d.weight, +1, ex.weightStep || 2.5, 0, null);
    else if (act === 'r-') d.reps = clampStep(d.reps, -1, 1, 1, 50);
    else if (act === 'r+') d.reps = clampStep(d.reps, +1, 1, 1, 50);
    else if (act === 'i-') d.rir = clampStep(d.rir, -1, 1, 0, 5);
    else if (act === 'i+') d.rir = clampStep(d.rir, +1, 1, 0, 5);
    else if (act === 'log') { logCurrent(item, d); return; }
    render();
  });

  // ручной ввод: пока печатают — обновляем черновик без render (не теряем каретку)
  root.addEventListener('input', (e) => {
    const inp = e.target.closest('.val-in');
    if (!inp) return;
    const d = drafts[inp.dataset.ex];
    if (!d) return;
    const v = parseFloat(inp.value);
    if (!isNaN(v)) d[inp.dataset.field] = v;
  });
  // по завершении ввода — клампим и показываем очищенное значение (без render)
  root.addEventListener('change', (e) => {
    const inp = e.target.closest('.val-in');
    if (!inp) return;
    const d = drafts[inp.dataset.ex];
    if (!d) return;
    const f = inp.dataset.field;
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = f === 'reps' ? 1 : 0;
    if (f === 'weight') v = Math.max(0, v);
    else if (f === 'reps') v = Math.max(1, Math.round(v));
    else if (f === 'rir') v = Math.min(5, Math.max(0, Math.round(v)));
    d[f] = v;
    inp.value = v;
  });

  function logCurrent(item, d) {
    ensureSession();
    const setNo = exSets(item.exerciseId).length + 1;
    const res = S.logSet(state, session.id, {
      exerciseId: item.exerciseId,
      setNo,
      weight: d.weight,
      reps: d.reps,
      rir: d.rir,
      isCalibration: d.mode === 'probe',
    });
    state = res.state;
    S.save(state);
    onCommit(state);
    delete drafts[item.exerciseId];
    startRest(item.restSec);
  }

  function removeSet(setId) {
    // локальная правка: удаляем сет из сессии и пересохраняем
    if (!session) return;
    const sess = liveSession();
    sess.sets = sess.sets.filter((s) => s.id !== setId);
    S.save(state);
    onCommit(state);
    render();
  }

  render();
  return { render, stopRest };
}

/* ---------- сигналы окончания отдыха ----------
 * iOS блокирует WebAudio вне пользовательского жеста, поэтому контекст
 * создаётся и «прогревается» на тапе (unlockAudio), а beep() лишь
 * возобновляет его и играет. navigator.vibrate на iPhone не работает —
 * оставлен как no-op-фолбэк для Android.
 */
let _audioCtx = null;
function _ac() {
  if (typeof window === 'undefined') return null;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  if (!_audioCtx) _audioCtx = new AC();
  return _audioCtx;
}
/** Вызвать из обработчика тапа — разблокирует звук на iOS. */
function unlockAudio() {
  try {
    const ac = _ac(); if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    // беззвучный «тычок», чтобы iOS разблокировал аудиосессию
    const b = ac.createBuffer(1, 1, 22050);
    const src = ac.createBufferSource();
    src.buffer = b; src.connect(ac.destination); src.start(0);
  } catch (_) {}
}
function beep() {
  try {
    const ac = _ac(); if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    // два коротких тона — заметнее в зале
    const blip = (startAt, freq) => {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.value = 0.0001;
      o.connect(g); g.connect(ac.destination);
      const t = ac.currentTime + startAt;
      g.gain.exponentialRampToValueAtTime(0.4, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      o.start(t); o.stop(t + 0.3);
    };
    blip(0, 880); blip(0.33, 1180);
  } catch (_) { /* тишина, если звук недоступен */ }
}
function buzz() {
  try { if (typeof navigator !== 'undefined' && navigator.vibrate) navigator.vibrate([160, 80, 160]); } catch (_) {}
}

/* export для node-тестов; в браузере — глобальные объявления */
if (typeof module !== 'undefined') {
  module.exports = {
    demoDayA, fmtClock, computeRemaining, clampStep, dayProgress, planExercise, initWorkout,
    WEEKDAYS, todayIdx, pickDayForDate, setsText, sessionSummary,
  };
}

</script>
  <script>
/* ============================================================
 * ui-program.js — конструктор дней A/B/C + библиотека упражнений
 * DOM в initProgram(); чистые хелперы экспортируются для тестов.
 * Зависимости в браузере — глобали store.js/exercises.js. В node
 * инъектируются через opts.store / opts.state.
 * ============================================================ */

/* ---------- чистые хелперы ---------- */

/** Сортировка библиотеки: группы мышц по порядку, внутри — по алфавиту.
 *  Так альтернативы на один пучок оказываются рядом. */
const MUSCLE_ORDER_UI = ['chest', 'back', 'legs', 'shoulders', 'arms', 'core'];
function groupByMuscle(list) {
  return [...list].sort((a, b) => {
    const d = MUSCLE_ORDER_UI.indexOf(a.primaryMuscle) - MUSCLE_ORDER_UI.indexOf(b.primaryMuscle);
    return d !== 0 ? d : a.name.localeCompare(b.name, 'ru');
  });
}

/** Дефолтные параметры элемента дня под тип упражнения. */
function defaultItemFor(ex) {
  const iso = ex.kind === 'isolation';
  return {
    exerciseId: ex.id,
    repRangeMin: iso ? 10 : 6,
    repRangeMax: iso ? 15 : 10,
    workSets: 3,
    targetRIR: 2,
    restSec: ex.kind === 'compound' ? 150 : 90,
  };
}

/** Короткое описание элемента дня для строки списка. */
function itemSummary(item, ex) {
  const name = ex ? ex.name : item.exerciseId;
  return `${name} · ${item.repRangeMin}–${item.repRangeMax}×${item.workSets} · RIR ${item.targetRIR} · ${item.restSec}с`;
}

/** Стартовая программа (день A) — засев пустой программы (заменит демо чанка 6). */
function starterProgram() {
  return [{
    id: 'day-a',
    label: 'A',
    items: [
      { exerciseId: 'bb-bench-press', repRangeMin: 6,  repRangeMax: 10, workSets: 3, targetRIR: 2, restSec: 180 },
      { exerciseId: 'bb-row',         repRangeMin: 8,  repRangeMax: 12, workSets: 3, targetRIR: 2, restSec: 150 },
      { exerciseId: 'ohp',            repRangeMin: 8,  repRangeMax: 12, workSets: 3, targetRIR: 2, restSec: 150 },
      { exerciseId: 'bb-curl',        repRangeMin: 10, repRangeMax: 15, workSets: 3, targetRIR: 2, restSec: 90  },
    ],
  }];
}

function seedProgramIfEmpty(state) {
  if (state.program.days.length > 0) return state;
  return { ...state, program: { ...state.program, days: starterProgram() } };
}

/* ---------- DOM ---------- */

function initProgram(root, opts = {}) {
  const St = opts.store || {
    load, save, searchExercises, getExercise,
    addDay, updateDay, deleteDay, addDayItem, updateDayItem, removeDayItem, moveDayItem,
    addCustomExercise, deleteCustomExercise,
  };
  const lib = () => (opts.library || (typeof EXERCISE_LIBRARY !== 'undefined' ? EXERCISE_LIBRARY : []));
  const muscleLabels = opts.muscleLabels || (typeof MUSCLE_LABELS !== 'undefined' ? MUSCLE_LABELS : {});

  const onCommit = opts.onCommit || function () {};
  let state = opts.state || St.load(lib());
  let picker = null;   // { dayId } когда открыт выбор упражнения
  let query = '', muscle = null, customOpen = false;
  let wiz = { count: 3, days: [], sex: 'm', goal: 'hypertrophy', time: 60, split: 'auto' };   // мастер создания программы

  function persist(next) { state = next; St.save(state); onCommit(state); render(); }

  function render() {
    const days = state.program.days;
    // программы нет → мастер: кол-во тренировок → дни недели → создать
    if (!days.length) {
      root.innerHTML = `<div class="prog-screen">${wizardHtml()}</div>`;
      return;
    }
    const daysHtml = days.map((d) => dayCard(d)).join('');
    root.innerHTML = `
      <div class="prog-screen">
        <div class="prog-top">
          <div class="wk-title">Программа</div>
          <div>
            <button class="btn ghost sm" data-act="wiz-reset">🪄 Мастер</button>
            <button class="btn sm" data-act="add-day">+ день</button>
          </div>
        </div>
        ${daysHtml}
      </div>
      ${picker ? pickerHtml() : ''}`;
  }

  function wizardHtml() {
    const wd = (typeof WEEKDAYS !== 'undefined') ? WEEKDAYS : ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    const picked = wiz.days.length;
    const opt = (act, val, cur, label) =>
      `<button class="chip${cur === val ? ' on' : ''}" data-act="${act}" data-v="${val}">${label}</button>`;
    return `
      <div class="wk-title" style="padding:6px 4px 12px">Новая программа</div>
      <section class="day-card">
        <div class="wiz-step"><b>1.</b> Пол</div>
        <div class="chips">${opt('wiz-sex', 'm', wiz.sex, 'Мужчина')}${opt('wiz-sex', 'f', wiz.sex, 'Женщина')}</div>

        <div class="wiz-step"><b>2.</b> Цель</div>
        <div class="chips">
          ${opt('wiz-goal', 'hypertrophy', wiz.goal, 'Рост мышц')}
          ${opt('wiz-goal', 'strength', wiz.goal, 'Сила')}
          ${opt('wiz-goal', 'fitness', wiz.goal, 'Тонус')}
        </div>

        <div class="wiz-step"><b>3.</b> Сколько тренировок в неделю?</div>
        <div class="chips">${[2, 3, 4, 5].map((n) =>
          `<button class="chip${wiz.count === n ? ' on' : ''}" data-act="wiz-count" data-n="${n}">${n}</button>`).join('')}</div>

        <div class="wiz-step"><b>4.</b> В какие дни? <small>(выбрано ${picked}/${wiz.count})</small></div>
        <div class="chips">${wd.map((label, i) =>
          `<button class="chip${wiz.days.includes(i) ? ' on' : ''}" data-act="wiz-wd" data-wd="${i}">${label}</button>`).join('')}</div>

        <div class="wiz-step"><b>5.</b> Время на тренировку</div>
        <div class="chips">
          ${opt('wiz-time', 45, wiz.time, '45 мин')}
          ${opt('wiz-time', 60, wiz.time, '60 мин')}
          ${opt('wiz-time', 90, wiz.time, '90 мин')}
        </div>

        <div class="wiz-step"><b>6.</b> Формат</div>
        <div class="chips">
          ${opt('wiz-split', 'auto', wiz.split, 'Авто')}
          ${opt('wiz-split', 'full', wiz.split, 'Фулбади')}
          ${opt('wiz-split', 'split', wiz.split, 'По группам')}
        </div>

        <div class="meso-actions">
          <button class="btn" data-act="wiz-generate" ${picked === wiz.count ? '' : 'disabled'}>🪄 Подобрать упражнения</button>
          <button class="btn ghost" data-act="wiz-create" ${picked === wiz.count ? '' : 'disabled'}>Создать пустую</button>
        </div>
        <div class="meso-hint">Подбор — по принципам доказательного тренинга (Schoenfeld, Israetel/RP, Helms):
        10–20 сетов на группу в неделю, каждая группа ≥2×/нед, работа близко к отказу (RIR ведёт мезоцикл),
        приоритет упражнениям с растянутой позицией. Всё можно править после создания.</div>
      </section>`;
  }

  function dayCard(d) {
    const items = d.items.map((it, i) => {
      const ex = St.getExercise(state, it.exerciseId) || { name: it.exerciseId };
      return `
        <div class="prog-item" data-day="${d.id}" data-idx="${i}">
          <div class="pi-top">
            <div class="pi-name">${ex.name} <a class="vid-link" href="${videoUrl(ex)}" target="_blank" rel="noopener">🎬</a></div>
            <div class="pi-ord">
              <button class="mini" data-act="swap-item" data-day="${d.id}" data-idx="${i}" title="Заменить аналогом">⇄</button>
              <button class="mini" data-act="up"   data-day="${d.id}" data-idx="${i}">↑</button>
              <button class="mini" data-act="down" data-day="${d.id}" data-idx="${i}">↓</button>
              <button class="mini" data-act="rm-item" data-day="${d.id}" data-idx="${i}">✕</button>
            </div>
          </div>
          <div class="pi-params">
            ${miniStep(d.id, i, 'repRangeMin', it.repRangeMin, 'повт min')}
            ${miniStep(d.id, i, 'repRangeMax', it.repRangeMax, 'повт max')}
            ${miniStep(d.id, i, 'workSets', it.workSets, 'сеты')}
            ${miniStep(d.id, i, 'targetRIR', it.targetRIR, 'RIR')}
            ${miniStep(d.id, i, 'restSec', it.restSec, 'отдых, с')}
          </div>
        </div>`;
    }).join('') || '<div class="pi-empty">Пусто — добавьте упражнение.</div>';

    const wd = (typeof WEEKDAYS !== 'undefined') ? WEEKDAYS : ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    const wdChips = wd.map((label, i) =>
      `<button class="chip wd${d.weekday === i ? ' on' : ''}" data-act="set-wd" data-day="${d.id}" data-wd="${i}">${label}</button>`).join('');

    return `
      <section class="day-card">
        <div class="day-head">
          <div class="day-label">День ${d.label}${d.weekday != null ? ' · ' + wd[d.weekday] : ''}</div>
          <div>
            <button class="btn sm" data-act="add-item" data-day="${d.id}">+ упражнение</button>
            <button class="mini" data-act="del-day" data-day="${d.id}">🗑</button>
          </div>
        </div>
        <div class="chips wd-row">${wdChips}</div>
        ${items}
      </section>`;
  }

  function miniStep(dayId, idx, field, value, label) {
    return `
      <div class="mstep" data-field="${field}">
        <button class="ms-btn" data-act="p-" data-day="${dayId}" data-idx="${idx}" data-field="${field}">−</button>
        <label class="ms-val"><input class="ms-in" type="number" inputmode="numeric" data-day="${dayId}" data-idx="${idx}" data-field="${field}" value="${value}"><small>${label}</small></label>
        <button class="ms-btn" data-act="p+" data-day="${dayId}" data-idx="${idx}" data-field="${field}">+</button>
      </div>`;
  }

  /** Список библиотеки: сгруппирован по мышцам, с заголовками секций. */
  function libListHtml(results) {
    const sorted = groupByMuscle(results);
    let lastMuscle = null;
    const parts = [];
    for (const e of sorted) {
      if (e.primaryMuscle !== lastMuscle) {
        lastMuscle = e.primaryMuscle;
        parts.push(`<div class="lib-head">${muscleLabels[lastMuscle] || lastMuscle}</div>`);
      }
      parts.push(`<button class="lib-row" data-act="pick" data-id="${e.id}">
         <span>${e.name}${e.isCustom ? ' <span class="badge cal">своё</span>' : ''}</span>
         <small>${muscleLabels[e.primaryMuscle] || e.primaryMuscle} · ${e.kind === 'compound' ? 'база' : 'изоляция'}</small>
       </button>`);
    }
    return parts.join('') || '<div class="pi-empty">Ничего не найдено.</div>';
  }

  function pickerHtml() {
    const results = St.searchExercises(state, { query, muscle });
    const chips = ['chest', 'back', 'legs', 'shoulders', 'arms', 'core']
      .map((m) => `<button class="chip${muscle === m ? ' on' : ''}" data-act="filter" data-m="${m}">${muscleLabels[m] || m}</button>`).join('');
    const list = libListHtml(results);

    const custom = customOpen ? `
      <div class="custom-form">
        <input class="in" id="cx-name" placeholder="Название своего упражнения">
        <div class="cx-err" id="cx-err"></div>
        <div class="chips">${['chest','back','legs','shoulders','arms','core'].map((m)=>`<button class="chip${m==='chest'?' on':''}" data-act="cx-m" data-m="${m}">${muscleLabels[m]||m}</button>`).join('')}</div>
        <div class="row">
          <button class="chip" data-act="cx-kind" data-kind="compound">база</button>
          <button class="chip on" data-act="cx-kind" data-kind="isolation">изоляция</button>
          <input class="in short" id="cx-step" type="number" step="0.5" value="2.5" placeholder="шаг, кг">
        </div>
        <button class="btn" data-act="cx-create">Создать и добавить</button>
      </div>` : `<button class="btn ghost" data-act="cx-open">+ своё упражнение</button>`;

    return `
      <div class="overlay" data-act="close-bg">
        <div class="sheet">
          <div class="sheet-head">
            <b>${picker && picker.replaceIdx != null ? 'Заменить аналогом (та же группа)' : 'Выбрать упражнение'}</b>
            <button class="mini" data-act="close">✕</button>
          </div>
          <input class="in" id="lib-search" placeholder="Поиск…" value="${query}">
          <div class="chips">${chips}</div>
          <div class="lib-list">${list}</div>
          ${custom}
        </div>
      </div>`;
  }

  /* --- события --- */
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const dayId = btn.dataset.day, idx = btn.dataset.idx != null ? +btn.dataset.idx : null;

    switch (act) {
      case 'wiz-sex': wiz.sex = btn.dataset.v; render(); break;
      case 'wiz-goal': wiz.goal = btn.dataset.v; render(); break;
      case 'wiz-time': wiz.time = +btn.dataset.v; render(); break;
      case 'wiz-split': wiz.split = btn.dataset.v; render(); break;
      case 'wiz-count': wiz.count = +btn.dataset.n; wiz.days = wiz.days.slice(0, wiz.count); render(); break;
      case 'wiz-wd': {
        const w = +btn.dataset.wd;
        if (wiz.days.includes(w)) wiz.days = wiz.days.filter((x) => x !== w);
        else if (wiz.days.length < wiz.count) wiz.days = [...wiz.days, w];
        render(); break;
      }
      case 'wiz-create': {
        if (wiz.days.length !== wiz.count) break;
        let next = state;
        for (const w of [...wiz.days].sort((a, b) => a - b)) {
          const r = St.addDay(next, { weekday: w });
          next = r.state;
        }
        persist(next); break;
      }
      case 'wiz-generate': {
        if (wiz.days.length !== wiz.count) break;
        const gen = generateProgram(
          { sex: wiz.sex, goal: wiz.goal, daysPerWeek: wiz.count, minutes: wiz.time, split: wiz.split },
          state.exercises
        );
        const wds = [...wiz.days].sort((a, b) => a - b);
        let next = state;
        gen.days.forEach((gd, i) => {
          const r = St.addDay(next, { label: gd.label, weekday: wds[i] });
          next = r.state;
          for (const it of gd.items) next = St.addDayItem(next, r.day.id, it);
        });
        persist(next); break;
      }
      case 'wiz-reset': {
        if (!confirmDel('Пересоздать программу? Текущие дни будут удалены (история тренировок сохранится).')) break;
        let next = state;
        for (const d of [...state.program.days]) next = St.deleteDay(next, d.id);
        wiz.days = [];
        persist(next); break;
      }
      case 'set-wd': {
        const cur = state.program.days.find((d) => d.id === dayId);
        const w = +btn.dataset.wd;
        persist(St.updateDay(state, dayId, { weekday: cur && cur.weekday === w ? null : w }));
        break;
      }
      case 'add-day': { const r = St.addDay(state); persist(r.state); break; }
      case 'del-day': { if (confirmDel('Удалить день?')) persist(St.deleteDay(state, dayId)); break; }
      case 'rm-item': persist(St.removeDayItem(state, dayId, idx)); break;
      case 'up': persist(St.moveDayItem(state, dayId, idx, -1)); break;
      case 'down': persist(St.moveDayItem(state, dayId, idx, +1)); break;
      case 'p-': case 'p+': stepParam(dayId, idx, btn.dataset.field, act === 'p+' ? +1 : -1); break;
      case 'add-item': picker = { dayId }; query = ''; muscle = null; customOpen = false; render(); break;
      case 'swap-item': {
        // замена аналогом: открываем список сразу с фильтром на ту же группу мышц
        const day = state.program.days.find((d) => d.id === dayId);
        const cur = day && St.getExercise(state, day.items[idx].exerciseId);
        picker = { dayId, replaceIdx: idx };
        query = ''; muscle = cur ? cur.primaryMuscle : null; customOpen = false;
        render(); break;
      }
      case 'close': case 'close-bg': if (act === 'close' || e.target.classList.contains('overlay')) { picker = null; customOpen = false; render(); } break;
      case 'filter': muscle = (muscle === btn.dataset.m ? null : btn.dataset.m); render(); break;
      case 'pick': pickExercise(btn.dataset.id); break;
      case 'cx-open': customOpen = true; render(); break;
      // выбор мышцы/типа — только классы, без render (иначе стирается ввод названия)
      case 'cx-m': root.querySelectorAll('.custom-form [data-act="cx-m"]').forEach((x) => x.classList.remove('on')); btn.classList.add('on'); break;
      case 'cx-kind': root.querySelectorAll('[data-act="cx-kind"]').forEach((x) => x.classList.remove('on')); btn.classList.add('on'); break;
      case 'cx-create': createCustom(); break;
    }
  });

  // поиск: обновляем только список, чтобы не терять фокус ввода
  root.addEventListener('input', (e) => {
    if (e.target.id === 'lib-search') {
      query = e.target.value;
      const listEl = root.querySelector('.lib-list');
      if (listEl) listEl.innerHTML = libListHtml(St.searchExercises(state, { query, muscle }));
    }
  });

  // ручной ввод параметров дня: коммитим по завершении ввода (без render — не ломаем каретку/клики)
  root.addEventListener('change', (e) => {
    const inp = e.target.closest('.ms-in');
    if (!inp) return;
    const dayId = inp.dataset.day, idx = +inp.dataset.idx, field = inp.dataset.field;
    const day = state.program.days.find((d) => d.id === dayId);
    const it = day && day.items[idx];
    if (!it) return;
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = it[field];
    const min = field === 'restSec' ? 0 : field === 'targetRIR' ? 0 : 1;
    v = Math.max(min, Math.round(v));
    if (field === 'targetRIR') v = Math.min(5, v);
    if (field === 'repRangeMin') v = Math.min(v, it.repRangeMax);
    if (field === 'repRangeMax') v = Math.max(v, it.repRangeMin);
    state = St.updateDayItem(state, dayId, idx, { [field]: v });
    St.save(state); onCommit(state);
    inp.value = v;
  });

  function stepParam(dayId, idx, field, dir) {
    const day = state.program.days.find((d) => d.id === dayId);
    const it = day.items[idx];
    const step = field === 'restSec' ? 15 : 1;
    const min = field === 'targetRIR' ? 0 : 1;
    let v = it[field] + dir * step;
    if (v < min) v = min;
    if (field === 'targetRIR' && v > 5) v = 5;
    if (field === 'repRangeMin' && v > it.repRangeMax) v = it.repRangeMax;
    if (field === 'repRangeMax' && v < it.repRangeMin) v = it.repRangeMin;
    persist(St.updateDayItem(state, dayId, idx, { [field]: v }));
  }

  function pickExercise(exId) {
    const ex = St.getExercise(state, exId);
    if (!ex || !picker) return;
    const { dayId, replaceIdx } = picker;
    picker = null;                 // закрыть оверлей ДО persist — persist перерисовывает экран
    if (replaceIdx != null) {
      // замена: упражнение меняется, сеты/повторы/отдых пользователя сохраняются
      persist(St.updateDayItem(state, dayId, replaceIdx, { exerciseId: exId }));
    } else {
      persist(St.addDayItem(state, dayId, defaultItemFor(ex)));
    }
  }

  function createCustom() {
    const name = (root.querySelector('#cx-name') || {}).value || '';
    const step = (root.querySelector('#cx-step') || {}).value;
    const kindBtn = root.querySelector('.custom-form [data-act="cx-kind"].on');
    const kind = kindBtn ? kindBtn.dataset.kind : 'isolation';
    const mBtn = root.querySelector('.custom-form [data-act="cx-m"].on');
    const primaryMuscle = mBtn ? mBtn.dataset.m : 'chest';
    try {
      const r = St.addCustomExercise(state, { name, primaryMuscle, kind, weightStep: step });
      let next = r.state;
      if (picker) next = St.addDayItem(next, picker.dayId, defaultItemFor(r.exercise));
      picker = null; customOpen = false;
      persist(next);
    } catch (err) {
      const errEl = root.querySelector('#cx-err');   // без alert() — неблокирующая подсказка
      if (errEl) errEl.textContent = err.message;
    }
  }

  function confirmDel(msg) { return typeof confirm === 'undefined' ? true : confirm(msg); }

  render();
  return { render, getState: () => state };
}

/* export для node-тестов; в браузере — глобальные объявления */
if (typeof module !== 'undefined') {
  module.exports = { defaultItemFor, itemSummary, starterProgram, seedProgramIfEmpty, initProgram, groupByMuscle, MUSCLE_ORDER_UI };
}

</script>
  <script>
/* ============================================================
 * ui-analytics.js — экран аналитики: e1RM (canvas), объём по группам
 * (canvas), бейджи стагнации, лента истории с редактированием.
 * Чистые модели графиков экспортируются для тестов; отрисовка на
 * <canvas> и правки истории — DOM/браузер.
 * Зависимости в браузере — глобали analytics.js / store.js / exercises.js.
 * ============================================================ */

/* ---------- чистые модели графиков (тестируемые) ---------- */

/** Модель линейного графика e1RM → координаты точек в пикселях. */
function lineChartModel(points, { w = 320, h = 160, pad = 28 } = {}) {
  const n = points.length;
  if (n === 0) return { pts: [], empty: true, min: 0, max: 0, n: 0 };
  const vals = points.map((p) => p.e1rm);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (min === max) { min -= 1; max += 1; }                 // избегаем деления на 0
  const plotW = w - 2 * pad, plotH = h - 2 * pad;
  const pts = points.map((p, i) => ({
    x: pad + (n === 1 ? plotW / 2 : (plotW * i) / (n - 1)),
    y: pad + plotH * (1 - (p.e1rm - min) / (max - min)),
    e1rm: p.e1rm,
    isCalibration: !!p.isCalibration,
  }));
  return { pts, empty: false, min, max, n };
}

/** Модель столбчатого графика объёма + линии коридора. */
function barChartModel(bars, { w = 320, h = 160, pad = 28, corridor = [10, 20] } = {}) {
  const [lo, hi] = corridor;
  const maxScale = Math.max(hi + 2, ...bars.map((b) => b.count));
  const plotW = w - 2 * pad, plotH = h - 2 * pad;
  const slot = plotW / Math.max(1, bars.length);
  const bw = slot * 0.62;
  const yOf = (v) => pad + plotH * (1 - v / maxScale);
  const rects = bars.map((b, i) => {
    const y = yOf(b.count);
    return {
      x: pad + i * slot + (slot - bw) / 2,
      y,
      w: bw,
      h: pad + plotH - y,
      muscle: b.muscle,
      count: b.count,
      status: b.status,
    };
  });
  return { rects, loY: yOf(lo), hiY: yOf(hi), maxScale, baseY: pad + plotH };
}

/* ---------- палитра (canvas не читает CSS-переменные) ---------- */
const APAL = {
  line: '#4c8dff', cal: '#b07cff', grid: '#2b313b', axis: '#3a4759',
  text: '#94a0b0', ok: '#4c8dff', low: '#f0a336', high: '#ff5d5d', barBg: '#3a4759',
};

/* ---------- DOM ---------- */

function initAnalytics(root, opts = {}) {
  const St = opts.store || { load, save, updateSet, deleteSet, getExercise };
  const An = opts.analytics || {
    e1rmSeries, weeklyVolume, stagnation, MUSCLE_ORDER, VOLUME_CORRIDOR,
    monthGrid, WEEKDAY_SHORT, RUN_TYPES, fmtPace, paceSecKm,
  };
  const lib = opts.library || (typeof EXERCISE_LIBRARY !== 'undefined' ? EXERCISE_LIBRARY : []);
  const muscleLabels = opts.muscleLabels || (typeof MUSCLE_LABELS !== 'undefined' ? MUSCLE_LABELS : {});

  const onCommit = opts.onCommit || function () {};
  let state = opts.state || St.load(lib);
  let selEx = null;
  let editing = null;               // setId в режиме правки
  let draft = null;                 // { weight, reps, rir }
  const _now = new Date();
  let calYear = _now.getFullYear(), calMonth = _now.getMonth();   // видимый месяц календаря
  let calSel = null;                // выбранная дата (детали дня)

  function persist(next) { state = next; St.save(state); onCommit(state); render(); }

  function loggedExercises() {
    const ids = new Set();
    for (const s of state.sessions) for (const st of s.sets) ids.add(st.exerciseId);
    return state.exercises.filter((e) => ids.has(e.id));
  }

  const MONTHS = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
  const todayISO = new Date().toISOString().slice(0, 10);

  function calendarHtml() {
    const weeks = An.monthGrid(state, { year: calYear, month: calMonth });
    const head = An.WEEKDAY_SHORT.map((w) => `<div class="cal-wd">${w}</div>`).join('');
    const cells = weeks.map((row) => row.map((c) => {
      const cls = ['cal-cell'];
      if (!c.inMonth) cls.push('out');
      if (c.date === todayISO) cls.push('today');
      if (c.date === calSel) cls.push('sel');
      const marks = [];
      if (c.workoutSets) marks.push('<span class="cal-m wo">🏋️</span>');
      for (const r of c.runs.slice(0, 3)) marks.push(`<span class="cal-dot ${r.hard ? 'hard' : 'easy'}"></span>`);
      if (c.plannedRun && !c.runs.length) marks.push('<span class="cal-dot plan"></span>');   // плановый бег
      const planned = (!c.workoutSets && c.plannedLabel) ? `<span class="cal-plan">${c.plannedLabel}</span>` : '';
      return `<button class="${cls.join(' ')}" data-act="cal-day" data-date="${c.date}">
        <span class="cal-n">${c.dayNum}</span>${planned}
        <span class="cal-marks">${marks.join('')}</span></button>`;
    }).join('')).join('');

    return `
      <section class="an-card">
        <div class="an-head">
          <b>Календарь</b>
          <div class="cal-nav">
            <button class="mini" data-act="cal-prev">‹</button>
            <span class="cal-title">${MONTHS[calMonth]} ${calYear}</span>
            <button class="mini" data-act="cal-next">›</button>
          </div>
        </div>
        <div class="cal-grid">${head}${cells}</div>
        <div class="cal-legend"><span>🏋️ силовая</span><span><i class="cal-dot easy"></i> лёгкий</span><span><i class="cal-dot hard"></i> тяжёлый</span><span><i class="cal-dot plan"></i> план бега</span><span class="cal-plan">A</span> план зала</div>
        ${calDetailHtml()}
      </section>`;
  }

  function calDetailHtml() {
    if (!calSel) return '';
    const sessions = (state.sessions || []).filter((s) => String(s.date).slice(0, 10) === calSel);
    const runs = (state.runs || []).filter((r) => String(r.date).slice(0, 10) === calSel);
    if (!sessions.length && !runs.length) {
      const planned = An.monthGrid(state, { year: calYear, month: calMonth }).flat().find((c) => c.date === calSel);
      const p = planned && planned.plannedLabel ? ` По плану: день ${planned.plannedLabel}.` : '';
      return `<div class="cal-detail"><b>${calSel}</b> — пусто.${p}</div>`;
    }
    const parts = [];
    for (const s of sessions) {
      const sum = An.RUN_TYPES ? null : null;
      const nSets = s.sets.filter((x) => !x.isCalibration).length;
      const exNames = [...new Set(s.sets.map((x) => (St.getExercise(state, x.exerciseId) || { name: x.exerciseId }).name))];
      parts.push(`<div class="cal-detail-row">🏋️ Силовая · ${nSets} подх · ${exNames.join(', ')}</div>`);
    }
    for (const r of runs) {
      const t = An.RUN_TYPES[r.type] || { label: r.type };
      parts.push(`<div class="cal-detail-row">🏃 ${t.label} · ${r.distanceKm} км · ${An.fmtPace(An.paceSecKm(r.distanceKm, r.durationSec))}/км${r.avgHr ? ' · ' + r.avgHr + ' уд' : ''}</div>`);
    }
    return `<div class="cal-detail"><b>${calSel}</b>${parts.join('')}</div>`;
  }

  function render() {
    const exs = loggedExercises();
    if (!selEx || !exs.some((e) => e.id === selEx)) selEx = exs.length ? exs[0].id : null;

    const stg = An.stagnation(state);
    root.innerHTML = `
      <div class="an-screen">
        <div class="wk-title">Аналитика</div>

        ${calendarHtml()}

        <section class="an-card">
          <div class="an-head">
            <b>Динамика e1RM</b>
            <select class="sel" id="an-ex">
              ${exs.map((e) => `<option value="${e.id}"${e.id === selEx ? ' selected' : ''}>${e.name}</option>`).join('') || '<option>нет данных</option>'}
            </select>
          </div>
          <canvas id="an-e1rm" class="chart"></canvas>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Объём за неделю</b><small>сеты · коридор ${An.VOLUME_CORRIDOR[0]}–${An.VOLUME_CORRIDOR[1]}</small></div>
          <canvas id="an-vol" class="chart"></canvas>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Стагнация</b></div>
          ${stg.length
            ? stg.map((s) => `<div class="stag"><div class="stag-name">${s.name}</div><div class="stag-hint">${s.hint}</div></div>`).join('')
            : '<div class="pi-empty">Нет застоя — e1RM растёт по всем упражнениям с историей.</div>'}
        </section>

        <section class="an-card">
          <div class="an-head"><b>История</b></div>
          ${historyHtml()}
        </section>
      </div>`;

    drawCharts();
  }

  function historyHtml() {
    const sessions = [...state.sessions]
      .filter((s) => s.sets.length)
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 12);
    if (!sessions.length) return '<div class="pi-empty">Пока нет залогированных тренировок.</div>';
    return sessions.map((s) => {
      const rows = s.sets.map((st) => setRow(st)).join('');
      return `<div class="hist-ses">
        <div class="hist-date">${s.date.slice(0, 10)}${s.isDeload ? ' · делоуд' : ''} · нед ${s.weekNo}</div>
        ${rows}
      </div>`;
    }).join('');
  }

  function setRow(st) {
    const ex = St.getExercise(state, st.exerciseId) || { name: st.exerciseId, weightStep: 2.5 };
    if (editing === st.id) {
      return `<div class="hist-edit" data-set="${st.id}">
        <div class="pi-name">${ex.name}</div>
        <div class="pi-params">
          ${eStep('weight', draft.weight, 'кг')}
          ${eStep('reps', draft.reps, 'повт')}
          ${eStep('rir', draft.rir, 'RIR')}
        </div>
        <div class="hist-actions">
          <button class="btn sm" data-act="save-set" data-set="${st.id}">Сохранить</button>
          <button class="btn sm ghost" data-act="cancel-set">Отмена</button>
          <button class="mini" data-act="del-set" data-set="${st.id}">🗑</button>
        </div>
      </div>`;
    }
    return `<div class="hist-row">
      <span class="hist-ex">${ex.name}${st.isCalibration ? ' <span class="badge cal">кал.</span>' : ''}</span>
      <span class="hist-val">${st.weight} × ${st.reps}${st.rir != null ? ' · RIR ' + st.rir : ''}</span>
      <button class="mini" data-act="edit-set" data-set="${st.id}">✎</button>
    </div>`;
  }

  function eStep(field, value, label) {
    return `<div class="mstep" data-field="${field}">
      <button class="ms-btn" data-act="e-" data-field="${field}">−</button>
      <label class="ms-val"><input class="ms-in" type="number" inputmode="decimal" data-field="${field}" value="${value}"><small>${label}</small></label>
      <button class="ms-btn" data-act="e+" data-field="${field}">+</button>
    </div>`;
  }

  /* --- отрисовка canvas --- */
  function drawCharts() {
    if (selEx) drawLine(root.querySelector('#an-e1rm'), An.e1rmSeries(state, selEx));
    drawBars(root.querySelector('#an-vol'), An.weeklyVolume(state).byMuscle);
  }

  function fitCanvas(cv) {
    if (!cv) return null;
    const cssW = cv.clientWidth || 320, cssH = 160;
    const dpr = (typeof window !== 'undefined' && window.devicePixelRatio) || 1;
    cv.width = cssW * dpr; cv.height = cssH * dpr;
    cv.style.height = cssH + 'px';
    const ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    return { ctx, w: cssW, h: cssH };
  }

  function drawLine(cv, series) {
    const c = fitCanvas(cv); if (!c) return;
    const { ctx, w, h } = c;
    const m = lineChartModel(series, { w, h });
    ctx.clearRect(0, 0, w, h);
    if (m.empty) { emptyText(ctx, w, h, 'Нет данных'); return; }
    // ось min/max
    ctx.fillStyle = APAL.text; ctx.font = '11px sans-serif';
    ctx.fillText(m.max.toFixed(0), 4, 16);
    ctx.fillText(m.min.toFixed(0), 4, h - 8);
    // линия
    ctx.strokeStyle = APAL.line; ctx.lineWidth = 2; ctx.beginPath();
    m.pts.forEach((p, i) => { i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y); });
    ctx.stroke();
    // точки
    m.pts.forEach((p) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = p.isCalibration ? APAL.cal : APAL.line; ctx.fill();
    });
  }

  function drawBars(cv, bars) {
    const c = fitCanvas(cv); if (!c) return;
    const { ctx, w, h } = c;
    const m = barChartModel(bars, { w, h, corridor: An.VOLUME_CORRIDOR });
    ctx.clearRect(0, 0, w, h);
    // коридор
    ctx.strokeStyle = APAL.axis; ctx.setLineDash([4, 4]); ctx.lineWidth = 1;
    [m.loY, m.hiY].forEach((y) => { ctx.beginPath(); ctx.moveTo(24, y); ctx.lineTo(w - 6, y); ctx.stroke(); });
    ctx.setLineDash([]);
    // столбцы
    m.rects.forEach((r) => {
      ctx.fillStyle = r.status === 'high' ? APAL.high : r.status === 'low' ? APAL.low : APAL.ok;
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = APAL.text; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(muscleLabels[r.muscle] || r.muscle, r.x + r.w / 2, m.baseY + 12);
      if (r.count) ctx.fillText(String(r.count), r.x + r.w / 2, r.y - 3);
      ctx.textAlign = 'left';
    });
  }

  function emptyText(ctx, w, h, txt) {
    ctx.fillStyle = APAL.text; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(txt, w / 2, h / 2); ctx.textAlign = 'left';
  }

  /* --- события --- */
  // ручной ввод при правке сета — обновляем draft без render (не теряем каретку)
  root.addEventListener('input', (e) => {
    const inp = e.target.closest('.ms-in');
    if (!inp || !draft) return;
    const v = parseFloat(inp.value);
    if (!isNaN(v)) draft[inp.dataset.field] = v;
  });
  root.addEventListener('change', (e) => {
    if (e.target.id === 'an-ex') { selEx = e.target.value; drawCharts(); return; }
    const inp = e.target.closest('.ms-in');
    if (!inp || !draft) return;
    const f = inp.dataset.field;
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = draft[f];
    if (f === 'weight') v = Math.max(0, v);
    else if (f === 'reps') v = Math.max(1, Math.round(v));
    else if (f === 'rir') v = Math.min(5, Math.max(0, Math.round(v)));
    draft[f] = v; inp.value = v;
  });
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]'); if (!btn) return;
    const act = btn.dataset.act, setId = btn.dataset.set;
    const st = setId ? findSet(setId) : null;

    if (act === 'cal-prev') { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } render(); }
    else if (act === 'cal-next') { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } render(); }
    else if (act === 'cal-day') { calSel = calSel === btn.dataset.date ? null : btn.dataset.date; render(); }
    else if (act === 'edit-set' && st) { editing = setId; draft = { weight: st.weight, reps: st.reps, rir: st.rir == null ? 0 : st.rir }; render(); }
    else if (act === 'cancel-set') { editing = null; draft = null; render(); }
    else if (act === 'e-' || act === 'e+') { stepDraft(btn.dataset.field, act === 'e+' ? 1 : -1, st); render(); }
    else if (act === 'save-set' && st) { persist(St.updateSet(state, setId, { weight: draft.weight, reps: draft.reps, rir: draft.rir })); editing = null; draft = null; }
    else if (act === 'del-set') { persist(St.deleteSet(state, setId)); editing = null; draft = null; }
  });

  function findSet(setId) {
    for (const s of state.sessions) { const f = s.sets.find((x) => x.id === setId); if (f) return f; }
    return null;
  }
  function stepDraft(field, dir, st) {
    if (!draft) return;
    const ex = st ? (St.getExercise(state, st.exerciseId) || { weightStep: 2.5 }) : { weightStep: 2.5 };
    if (field === 'weight') draft.weight = Math.max(0, +(draft.weight + dir * (ex.weightStep || 2.5)).toFixed(3));
    else if (field === 'reps') draft.reps = Math.max(1, draft.reps + dir);
    else if (field === 'rir') draft.rir = Math.min(5, Math.max(0, draft.rir + dir));
  }

  render();
  return { render, getState: () => state };
}

if (typeof module !== 'undefined') {
  module.exports = { lineChartModel, barChartModel, initAnalytics };
}

</script>
  <script>
/* ============================================================
 * ui-run.js — экран беговых тренировок: журнал + графики прогресса.
 * Методология: типы по Дэниелсу, поляризация 80/20 (Сейлер),
 * правило ~10% прироста недельного объёма.
 * Чистые расчёты — в analytics.js; графики переиспользуют
 * lineChartModel/barChartModel из ui-analytics.js.
 * ============================================================ */

/* палитра canvas (CSS-переменные канвасу недоступны) */
const RPAL = { line: '#37c46a', hr: '#f0a336', bar: '#4c8dff', warn: '#f0a336', bad: '#ff5d5d', text: '#94a0b0', axis: '#3a4759' };

function initRun(root, opts = {}) {
  const St = opts.store || { save, addRun, deleteRun, setRunPlanDay };
  const An = opts.analytics || {
    RUN_TYPES, fmtPace, paceSecKm, runWeeklySeries, easyPaceSeries, hardSharePct, rampWarning,
    hrMaxTanaka, hrZones, hrZoneFor, zoneAdvice, runTypeAdvice, runTarget,
  };

  function hrCfg() {
    const s = state.settings || {};
    const hrMax = s.hrMax || (s.age ? An.hrMaxTanaka(s.age) : null);
    return { hrMax, hrRest: s.hrRest };
  }
  const onCommit = opts.onCommit || function () {};
  let state = opts.state;

  const WD = (typeof WEEKDAYS !== 'undefined') ? WEEKDAYS : ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
  const todayWd = (typeof todayIdx !== 'undefined') ? todayIdx() : ((new Date().getDay() + 6) % 7);
  const planToday = (state.runPlan || {})[todayWd] || null;   // тип по плану на сегодня

  const today = new Date().toISOString().slice(0, 10);
  const draft = { type: planToday || 'easy', date: today, km: '', min: '', sec: '', hr: '', rpe: '', intervals: '', note: '' };
  let err = '';

  function lastRunOfType(type) {
    let best = null;
    for (const r of (state.runs || [])) if (r.type === type && (!best || new Date(r.date) > new Date(best.date))) best = r;
    return best;
  }

  function persist(next) { state = next; St.save(state); onCommit(state); render(); }

  /* --- рендер --- */
  function render() {
    const share = An.hardSharePct(state);
    const weekly = An.runWeeklySeries(state, { weeks: 8 });
    // рост объёма: сравниваем две последние ЗАВЕРШЁННЫЕ недели
    const ramp = weekly.length >= 3 && An.rampWarning(weekly[weekly.length - 3].km, weekly[weekly.length - 2].km);

    const typeChips = Object.entries(An.RUN_TYPES).map(([k, t]) =>
      `<button class="chip${draft.type === k ? ' on' : ''}" data-act="type" data-v="${k}">${t.label}</button>`).join('');
    const pt = (state.runPlan || {})[todayWd] || null;
    const planBanner = pt
      ? `<div class="plan-today">Сегодня по плану: <b>${An.RUN_TYPES[pt] ? An.RUN_TYPES[pt].label : pt}</b></div>`
      : '';

    root.innerHTML = `
      <div class="an-screen">
        <div class="wk-title">Бег</div>

        <section class="an-card">
          <div class="an-head"><b>Новая пробежка</b><input class="in short" type="date" id="run-date" value="${draft.date}"></div>
          ${planBanner}
          <div class="chips">${typeChips}</div>
          ${targetCardHtml()}
          <div class="run-grid">
            ${numField('km', 'км', draft.km, '0.1', 'напр. 8.5')}
            ${numField('min', 'мин', draft.min, '1', '45')}
            ${numField('sec', 'сек', draft.sec, '1', '30')}
            ${numField('hr', 'пульс', draft.hr, '1', 'опц.')}
            ${numField('rpe', 'RPE 1–10', draft.rpe, '1', 'опц.')}
          </div>
          <input class="in" id="run-intervals" placeholder="Отрезки, напр. 8×400м/отдых 90с (для интервалов)" value="${draft.intervals}">
          <input class="in" id="run-note" placeholder="Заметка (самочувствие, покрытие…)" value="${draft.note}">
          <div class="cx-err">${err}</div>
          <button class="log-wide" data-act="log-run">✓ Записать пробежку</button>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Интенсивность за 4 недели</b><small>цель ≤ 20–25% тяжёлого (80/20)</small></div>
          ${share.status === 'na'
            ? '<div class="pi-empty">Мало данных — залогируй 3+ пробежки.</div>'
            : `<div class="share-row">
                 <div class="share-bar"><div class="share-hard${share.status === 'high' ? ' over' : ''}" style="width:${share.hardPct}%"></div></div>
                 <b class="${share.status === 'high' ? 'warn-txt' : 'ok-txt'}">${share.hardPct}%</b>
               </div>
               <div class="meso-hint">Лёгкого ${share.easyMin} мин · тяжёлого ${share.hardMin} мин за ${share.sessions} пробежек.
               ${share.status === 'high' ? ' <b>Выше 25% — добавь лёгких/восстановительных.</b>' : ' В коридоре поляризованной модели.'}</div>`}
          ${ramp ? '<div class="cx-err" style="margin-top:8px">⚠ Объём прошлой недели вырос >10% к позапрошлой — следи за восстановлением (правило ~10%).</div>' : ''}
        </section>

        ${progressionCardHtml()}

        ${planCardHtml()}

        ${zonesCardHtml()}

        <section class="an-card">
          <div class="an-head"><b>Км в неделю</b><small>8 недель</small></div>
          <canvas id="run-vol" class="chart"></canvas>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Темп лёгких пробежек</b><small>ниже = быстрее</small></div>
          <canvas id="run-pace" class="chart"></canvas>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Журнал</b></div>
          ${runListHtml()}
        </section>
      </div>`;

    drawVolume(root.querySelector('#run-vol'), An.runWeeklySeries(state, { weeks: 8 }));
    drawPace(root.querySelector('#run-pace'), An.easyPaceSeries(state));
  }

  function targetCardHtml() {
    const t = An.runTarget(draft.type, lastRunOfType(draft.type), hrCfg());
    if (!t) return '';
    return `<div class="run-target lv-${t.lever || 'hold'}">
      <div class="rt-head">🎯 Цель · ${An.RUN_TYPES[draft.type].label} · <b>${t.zoneLabel}${t.zoneBpm ? ' (' + t.zoneBpm + ')' : ''}</b> · RPE ${t.rpe}</div>
      <div class="rt-goal">${t.goal}</div>
      <div class="rt-prog"><b>Сегодня:</b> ${t.progress}</div>
      <div class="rt-how">${t.howto}</div>
    </div>`;
  }

  function planCardHtml() {
    const plan = state.runPlan || {};
    const opts = [['', '—'], ['recovery', 'Восстан.'], ['easy', 'Лёгкий'], ['long', 'Длинный'], ['tempo', 'Темп'], ['interval', 'Интерв.'], ['reps', 'Повторы']];
    const rows = WD.map((w, i) => `
      <div class="plan-row${i === todayWd ? ' on' : ''}">
        <span class="plan-wd">${w}</span>
        <select class="sel run-plan-sel" data-wd="${i}">
          ${opts.map(([v, l]) => `<option value="${v}"${(plan[i] || '') === v ? ' selected' : ''}>${l}</option>`).join('')}
        </select>
      </div>`).join('');
    return `<section class="an-card">
      <div class="an-head"><b>План недели (бег)</b><small>тип по дням</small></div>
      <div class="plan-grid">${rows}</div>
      <div class="meso-hint">Назначь тип на день недели — на этот день подставится «сегодня по плану», а в календаре появится метка.</div>
    </section>`;
  }

  function progressionCardHtml() {
    const cfg = hrCfg();
    // последняя пробежка каждого типа
    const byType = {};
    for (const r of (state.runs || [])) {
      if (!byType[r.type] || new Date(r.date) > new Date(byType[r.type].date)) byType[r.type] = r;
    }
    const order = Object.keys(An.RUN_TYPES).filter((k) => byType[k]);
    if (!order.length) return '';
    const rows = order.map((k) => {
      const r = byType[k];
      const adv = An.runTypeAdvice(r, cfg);
      const pace = An.fmtPace(An.paceSecKm(r.distanceKm, r.durationSec));
      return `<div class="sum-ex">
        <div class="sum-row"><span>${An.RUN_TYPES[k].label}</span><small>${r.distanceKm} км · ${pace}/км${r.avgHr ? ' · ' + r.avgHr + ' уд' : ''}</small></div>
        ${adv ? `<div class="sum-advice lv-${adv.lever}"><b>След. раз:</b> ${adv.text}</div>` : ''}
      </div>`;
    }).join('');
    return `<section class="an-card">
      <div class="an-head"><b>Прогрессия по типам</b><small>рекомендация на след. пробежку</small></div>
      ${rows}
    </section>`;
  }

  function zonesCardHtml() {
    const zones = An.hrZones(hrCfg());
    if (!zones) return `<section class="an-card"><div class="an-head"><b>Пульсовые зоны</b></div>
      <div class="pi-empty">Настрой пульс в <b>Настройках</b> — покажу целевые зоны по пульсу.</div></section>`;
    return `<section class="an-card">
      <div class="an-head"><b>Мои пульсовые зоны</b><small>уд/мин</small></div>
      <div class="hr-zones">${zones.map((z) =>
        `<div class="hr-zone z${z.n}"><span class="hz-n">Z${z.n}</span>
           <span class="hz-name">${z.name}</span>
           <span class="hz-use">${z.use}</span>
           <span class="hz-bpm">${z.lo}–${z.hi}</span></div>`).join('')}</div>
    </section>`;
  }

  function numField(id, label, value, step, ph) {
    return `<label class="run-f"><small>${label}</small>
      <input class="in" id="run-${id}" type="number" inputmode="decimal" step="${step}" min="0" placeholder="${ph}" value="${value}"></label>`;
  }

  function runListHtml() {
    const runs = [...(state.runs || [])].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 15);
    if (!runs.length) return '<div class="pi-empty">Пока нет пробежек.</div>';
    const cfg = hrCfg();
    return runs.map((r) => {
      const t = An.RUN_TYPES[r.type] || { label: r.type, hard: false };
      const pace = An.fmtPace(An.paceSecKm(r.distanceKm, r.durationSec));
      const zone = r.avgHr ? An.hrZoneFor(r.avgHr, cfg) : null;
      const advice = zone ? An.zoneAdvice(r.type, zone) : '';
      const zoneTag = zone ? ` · <b class="zbadge z${zone}">Z${zone}</b>` : '';
      return `<div class="run-row${t.hard ? ' hard' : ''}">
        <div class="run-main">
          <b>${String(r.date).slice(0, 10)} · ${t.label}</b>
          <span>${r.distanceKm} км · ${pace}/км${r.avgHr ? ' · ' + r.avgHr + ' уд' + zoneTag : ''}${r.rpe ? ' · RPE ' + r.rpe : ''}</span>
          ${advice ? `<small class="zadvice">⚠ ${advice}</small>` : ''}
          ${r.intervals ? `<small>${r.intervals}</small>` : ''}${r.note ? `<small>${r.note}</small>` : ''}
        </div>
        <button class="mini" data-act="del-run" data-id="${r.id}">✕</button>
      </div>`;
    }).join('');
  }

  /* --- canvas --- */
  function fit(cv) {
    if (!cv) return null;
    const w = cv.clientWidth || 320, h = 160;
    const dpr = (typeof window !== 'undefined' && window.devicePixelRatio) || 1;
    cv.width = w * dpr; cv.height = h * dpr; cv.style.height = h + 'px';
    const ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
    return { ctx, w, h };
  }
  function emptyTxt(ctx, w, h, t) { ctx.fillStyle = RPAL.text; ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText(t, w / 2, h / 2); ctx.textAlign = 'left'; }

  function drawVolume(cv, weekly) {
    const c = fit(cv); if (!c) return;
    const { ctx, w, h } = c;
    ctx.clearRect(0, 0, w, h);
    if (!weekly.some((x) => x.km > 0)) { emptyTxt(ctx, w, h, 'Нет данных'); return; }
    const bars = weekly.map((x) => ({ muscle: x.weekStart.slice(5), count: x.km, status: 'ok' }));
    const m = barChartModel(bars, { w, h, corridor: [0, 0] });
    m.rects.forEach((r) => {
      ctx.fillStyle = RPAL.bar; ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.fillStyle = RPAL.text; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(r.muscle, r.x + r.w / 2, m.baseY + 11);
      if (r.count) ctx.fillText(String(r.count), r.x + r.w / 2, r.y - 3);
      ctx.textAlign = 'left';
    });
  }

  function drawPace(cv, series) {
    const c = fit(cv); if (!c) return;
    const { ctx, w, h } = c;
    ctx.clearRect(0, 0, w, h);
    if (series.length < 2) { emptyTxt(ctx, w, h, 'Нужно 2+ лёгких пробежки'); return; }
    const m = lineChartModel(series.map((p) => ({ e1rm: p.pace })), { w, h });
    ctx.fillStyle = RPAL.text; ctx.font = '11px sans-serif';
    ctx.fillText(An.fmtPace(m.max), 4, 16);
    ctx.fillText(An.fmtPace(m.min), 4, h - 8);
    ctx.strokeStyle = RPAL.line; ctx.lineWidth = 2; ctx.beginPath();
    m.pts.forEach((p, i) => { i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y); });
    ctx.stroke();
    m.pts.forEach((p) => { ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fillStyle = RPAL.line; ctx.fill(); });
  }

  /* --- события --- */
  root.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]'); if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'type') { syncDraft(); draft.type = btn.dataset.v; err = ''; render(); }
    else if (act === 'log-run') logRun();
    else if (act === 'del-run') persist(St.deleteRun(state, btn.dataset.id));
  });

  // изменение плана бега по дням
  root.addEventListener('change', (e) => {
    const sel = e.target.closest('.run-plan-sel');
    if (!sel) return;
    persist(St.setRunPlanDay(state, +sel.dataset.wd, sel.value));
  });

  function syncDraft() {
    for (const k of ['km', 'min', 'sec', 'hr', 'rpe']) {
      const el = root.querySelector('#run-' + k); if (el) draft[k] = el.value;
    }
    const d = root.querySelector('#run-date'); if (d) draft.date = d.value || today;
    const iv = root.querySelector('#run-intervals'); if (iv) draft.intervals = iv.value;
    const nt = root.querySelector('#run-note'); if (nt) draft.note = nt.value;
  }

  function logRun() {
    syncDraft();
    const km = parseFloat(draft.km);
    const durationSec = (parseInt(draft.min || 0, 10) || 0) * 60 + (parseInt(draft.sec || 0, 10) || 0);
    try {
      const r = St.addRun(state, {
        date: draft.date ? draft.date + 'T12:00:00.000Z' : undefined,
        type: draft.type,
        distanceKm: km,
        durationSec,
        avgHr: draft.hr, rpe: draft.rpe,
        intervals: draft.intervals.trim() || null,
        note: draft.note.trim() || null,
      });
      draft.km = ''; draft.min = ''; draft.sec = ''; draft.hr = ''; draft.rpe = ''; draft.intervals = ''; draft.note = '';
      err = '';
      persist(r.state);
    } catch (ex) {
      err = ex.message; render();
    }
  }

  render();
  return { render, getState: () => state };
}

if (typeof module !== 'undefined') {
  module.exports = { initRun };
}

</script>
  <script>
/* ============================================================
 * app.js — контроллер приложения: общий state, роутер экранов,
 * экран настроек (мезоцикл + бэкап), напоминание о бэкапе.
 * Единственный владелец state в браузере: экраны получают его и
 * возвращают изменения через onCommit — store.save() остаётся
 * единственной точкой записи.
 * ============================================================ */

function initApp() {
  // общий state (владелец — app.js); пустая программа не засевается —
  // вместо этого экран «Программа» показывает мастер создания
  let state = load(EXERCISE_LIBRARY);

  // экраны сообщают об изменениях сюда — держим один объект state
  const onCommit = (next) => { state = next; };

  const SCREENS = {
    workout: (root) => initWorkout(root, { state, onCommit }),
    run: (root) => initRun(root, { state, onCommit }),
    program: (root) => initProgram(root, { state, onCommit }),
    analytics: (root) => initAnalytics(root, { state, onCommit }),
    settings: (root) => renderSettings(root),
  };

  function show(name) {
    document.querySelectorAll('.screen').forEach((s) => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.querySelectorAll('#nav button').forEach((b) => b.classList.toggle('active', b.dataset.screen === name));
    // монтируем экран заново из актуального общего state
    SCREENS[name](document.getElementById(name + '-root'));
  }

  document.getElementById('nav').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-screen]');
    if (b) show(b.dataset.screen);
  });

  /* ---------- экран настроек: мезоцикл + бэкап ---------- */

  function effectiveHrMax() {
    const s = state.settings;
    return s.hrMax || (s.age ? hrMaxTanaka(s.age) : null);
  }

  function hrZonesHtml() {
    const zones = hrZones({ hrMax: effectiveHrMax(), hrRest: state.settings.hrRest });
    if (!zones) return '<div class="pi-empty">Укажи возраст или пульс макс — покажу твои зоны.</div>';
    const method = state.settings.hrRest ? 'Карвонен (резерв ЧСС)' : '% от ЧССmax';
    return `<div class="hr-zones">${zones.map((z) =>
      `<div class="hr-zone z${z.n}"><span class="hz-n">Z${z.n}</span>
         <span class="hz-name">${z.name}</span>
         <span class="hz-bpm">${z.lo}–${z.hi}</span></div>`).join('')}</div>
      <div class="meso-hint">Метод: ${method}. ЧССmax ${effectiveHrMax()}${state.settings.hrRest ? ', покой ' + state.settings.hrRest : ''} уд/мин.</div>`;
  }

  function renderSettings(root) {
    const m = mesoStatus(state);
    const overdue = backupOverdue(state);
    const last = state.settings.lastBackupAt ? state.settings.lastBackupAt.slice(0, 10) : 'никогда';

    root.innerHTML = `
      <div class="an-screen">
        <div class="wk-title">Настройки</div>

        <section class="an-card">
          <div class="an-head"><b>Мезоцикл</b></div>
          <div class="meso-row">
            <div class="meso-badge">Цикл ${m.cycleNo}</div>
            <div class="meso-badge">Неделя ${m.weekNo}${m.isDeload ? ' · делоуд' : ''}</div>
            <div class="meso-badge">Цель RIR ${m.targetRIR}</div>
          </div>
          <div class="meso-actions">
            <button class="btn" data-act="adv-week">Завершить неделю →</button>
            <button class="btn ghost sm" data-act="deload-earlier">Делоуд раньше</button>
            <button class="btn ghost sm" data-act="deload-later">Делоуд позже</button>
          </div>
          <div class="meso-hint">Делоуд на неделе ${m.deloadWeek}${m.deloadShift ? ` (сдвиг ${m.deloadShift > 0 ? '+' : ''}${m.deloadShift})` : ''}. Сдвиг ±1 — риск из PRD.</div>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Пульсовые зоны</b></div>
          <div class="run-grid">
            <label class="run-f"><small>возраст</small><input class="in" id="hr-age" type="number" inputmode="numeric" min="10" max="99" placeholder="напр. 46" value="${state.settings.age || ''}"></label>
            <label class="run-f"><small>пульс макс</small><input class="in" id="hr-max" type="number" inputmode="numeric" min="120" max="220" placeholder="${state.settings.age ? '≈' + hrMaxTanaka(state.settings.age) : 'или возраст'}" value="${state.settings.hrMax || ''}"></label>
            <label class="run-f"><small>пульс покоя</small><input class="in" id="hr-rest" type="number" inputmode="numeric" min="30" max="100" placeholder="опц." value="${state.settings.hrRest || ''}"></label>
          </div>
          ${hrZonesHtml()}
          <div class="meso-hint">Не знаешь макс? Впиши возраст — прикинем по формуле Танаки (208−0.7·возраст). Пульс покоя (утром, лёжа) уточняет зоны методом Карвонена (по резерву ЧСС).</div>
        </section>

        <section class="an-card">
          <div class="an-head"><b>Бэкап данных</b></div>
          ${overdue ? '<div class="cx-err" style="color:var(--warn)">Пора сделать бэкап — данные хранятся только в этом браузере.</div>' : ''}
          <div class="meso-hint">Последний бэкап: ${last}. Сессий: ${state.sessions.length}.</div>
          <div class="meso-actions">
            <button class="btn" data-act="export">Скачать JSON</button>
            <label class="btn ghost" style="cursor:pointer">Импорт JSON
              <input type="file" id="import-file" accept="application/json,.json" style="display:none">
            </label>
          </div>
          <div class="cx-err" id="backup-msg"></div>
        </section>
      </div>`;

    root.onclick = (e) => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      const act = btn.dataset.act;
      if (act === 'adv-week') { state = advanceWeek(state); save(state); renderSettings(root); }
      else if (act === 'deload-earlier') { state = shiftDeload(state, -1); save(state); renderSettings(root); }
      else if (act === 'deload-later') { state = shiftDeload(state, +1); save(state); renderSettings(root); }
      else if (act === 'export') { doExport(root); }
    };

    // правка пульсовых настроек — по завершении ввода, с пересчётом таблицы зон
    root.onchange = (e) => {
      const map = { 'hr-age': 'age', 'hr-max': 'hrMax', 'hr-rest': 'hrRest' };
      const field = map[e.target.id];
      if (!field) return;
      state = updateSettings(state, { [field]: e.target.value });
      save(state); renderSettings(root);
    };

    const fileInput = root.querySelector('#import-file');
    if (fileInput) fileInput.addEventListener('change', (e) => doImport(e, root));
  }

  function doExport(root) {
    const b = exportBackup(state);
    state = b.state; save(state);                        // фиксируем дату бэкапа
    const url = URL.createObjectURL(new Blob([b.json], { type: 'application/json' }));
    const a = document.createElement('a');
    a.href = url; a.download = b.filename; document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    renderSettings(root);
  }

  function doImport(e, root) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        state = importBackup(String(reader.result));
        save(state);
        renderSettings(root);
      } catch (err) {
        const msg = root.querySelector('#backup-msg');
        if (msg) msg.textContent = 'Не удалось импортировать: ' + err.message;
      }
    };
    reader.readAsText(file);
  }

  // офлайн: регистрируем service worker (только в защищённом контексте — Pages/localhost)
  if (typeof navigator !== 'undefined' && 'serviceWorker' in navigator &&
      (location.protocol === 'https:' || location.hostname === 'localhost')) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }

  // старт: экран тренировки; мягкое напоминание о бэкапе
  show('workout');
  if (backupOverdue(state)) {
    const b = document.querySelector('#nav button[data-screen="settings"]');
    if (b) b.classList.add('nudge');
  }
}

if (typeof module !== 'undefined') {
  module.exports = { initApp };
} else if (typeof document !== 'undefined') {
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp);
  else initApp();
}

</script>
