<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <!-- iOS: полноэкранный режим при «На экран Домой» -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Тренер">
  <!-- PWA: установка на домашний экран + офлайн -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Тренер · силовые</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app">
    <!-- Экран: Тренировка (чанк 3) -->
    <section class="screen active" id="screen-workout">
      <div id="workout-root"></div>
    </section>

    <!-- Экран: Бег (v2) -->
    <section class="screen" id="screen-run">
      <div id="run-root"></div>
    </section>

    <!-- Экран: Программа (чанк 4) -->
    <section class="screen" id="screen-program">
      <div id="program-root"></div>
    </section>

    <!-- Экран: Аналитика (чанк 5) -->
    <section class="screen" id="screen-analytics">
      <div id="analytics-root"></div>
    </section>

    <!-- Экран: Настройки / бэкап (чанк 6) -->
    <section class="screen" id="screen-settings">
      <div id="settings-root"></div>
    </section>
  </div>

  <!-- Нижняя навигация (полноценный роутер — app.js, чанк 6) -->
  <nav class="nav" id="nav">
    <button class="active" data-screen="workout"><span class="ico">🏋️</span>Зал</button>
    <button data-screen="run"><span class="ico">🏃</span>Бег</button>
    <button data-screen="program"><span class="ico">🗂️</span>Прогр.</button>
    <button data-screen="analytics"><span class="ico">📈</span>Аналит.</button>
    <button data-screen="settings"><span class="ico">⚙️</span>Настр.</button>
  </nav>

  <!-- Порядок важен: библиотека → store → движок/аналитика → экраны → контроллер -->
  <script src="js/exercises.js"></script>
  <script src="js/store.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/program-gen.js"></script>
  <script src="js/ui-workout.js"></script>
  <script src="js/ui-program.js"></script>
  <script src="js/ui-analytics.js"></script>
  <script src="js/ui-run.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
